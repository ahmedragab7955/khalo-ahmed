              }

              // ePSXe: ACTION_VIEW first, then explicit component
              private void launchEpsxe(File rom,String path){
                  try{Intent i=new Intent(Intent.ACTION_VIEW);i.setDataAndType(Uri.fromFile(rom),"application/octet-stream");i.setPackage("com.epsxe.ePSXe");i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK|Intent.FLAG_GRANT_READ_URI_PERMISSION);startActivity(i);return;}catch(Exception ignored){}
                  for(String act:new String[]{"com.epsxe.ePSXe.ePSXe","com.epsxe.ePSXe.MainActivity"}){
                      try{Intent i=new Intent(Intent.ACTION_MAIN);i.setComponent(new ComponentName("com.epsxe.ePSXe",act));i.putExtra("com.epsxe.ePSXe.ROM",path);i.putExtra("ROM",path);i.setData(Uri.fromFile(rom));i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK|Intent.FLAG_ACTIVITY_CLEAR_TOP);startActivity(i);return;}catch(Exception ignored){}
                  }
