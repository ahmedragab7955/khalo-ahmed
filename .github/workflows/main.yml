          import android.widget.Toast; import java.io.File; import java.util.List;

          public class GamesActivity extends Activity {
              private static final long DELAY_SLOW=200,DELAY_MEDIUM=80,DELAY_FAST=28;
              private long holdStart=0; private boolean holding=false; private int holdDir=0;
              private int platformIdx,selectedGame=0;
              private boolean r1Pressed=false,r2Pressed=false;
              private ListView listView; private ImageView previewImg,previewBg;
              private TextView noArtIcon,previewTitle,platformName,gameCount,lastPlayedBadge;
              private Handler handler=new Handler(); private Runnable previewRunnable,scrollRunnable;
              private Thread imageThread; private String lastPlayedFile="";
              private List<GameItem> games; private ExitDialog exitDialog;

              @Override protected void onCreate(Bundle s){
                  super.onCreate(s); StrictMode.setVmPolicy(new StrictMode.VmPolicy.Builder().build());
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  setContentView(R.layout.activity_games);
                  platformIdx=getIntent().getIntExtra("platformIdx",0); String[] cfg=Config.PLATFORMS[platformIdx];
                  games=GameScanner.scan(cfg[0]);
                  listView=findViewById(R.id.gameList); previewImg=findViewById(R.id.previewImg); previewBg=findViewById(R.id.previewBg);
                  noArtIcon=findViewById(R.id.noArtIcon); previewTitle=findViewById(R.id.previewTitle);
                  platformName=findViewById(R.id.platformName); gameCount=findViewById(R.id.gameCount);
                  lastPlayedBadge=findViewById(R.id.lastPlayedBadge);
                  platformName.setText(cfg[0]); gameCount.setText(games.size()+" GAMES");
                  List<RecentEntry> recents=RecentStore.load(this); for(RecentEntry e:recents) if(e.platform.equals(cfg[0])){lastPlayedFile=e.file;break;}
                  String jumpTo=getIntent().getStringExtra("jumpToFile");
                  if(jumpTo!=null) for(int i=0;i<games.size();i++) if(games.get(i).file.equals(jumpTo)){selectedGame=i;break;}
                  setupList(); updatePreview(false);
              }

              private void setupList(){
                  GameAdapter adapter=new GameAdapter(); listView.setAdapter(adapter); listView.setSelection(selectedGame);
                  listView.setOnItemClickListener((p,v,pos,id)->{selectedGame=pos;adapter.notifyDataSetChanged();listView.setSelection(pos);updatePreview(true);});
              }

              private void updatePreview(boolean animate){
                  if(games.isEmpty()){showNoArt();previewTitle.setText("لا توجد ألعاب");lastPlayedBadge.setVisibility(View.GONE);return;}
                  GameItem g=games.get(selectedGame); previewTitle.setText(g.name);
                  lastPlayedBadge.setVisibility(!lastPlayedFile.isEmpty()&&g.file.equals(lastPlayedFile)?View.VISIBLE:View.GONE);
                  if(g.artPath.isEmpty()||!new File(g.artPath).exists()){showNoArt();return;}
                  final String path=g.artPath; final boolean anim=animate;
                  if(imageThread!=null&&imageThread.isAlive()) imageThread.interrupt();
                  imageThread=new Thread(()->{
                      Bitmap bmp=BitmapFactory.decodeFile(path); if(bmp==null||Thread.currentThread().isInterrupted()) return;
                      runOnUiThread(()->{previewImg.setImageBitmap(bmp);previewBg.setImageBitmap(bmp);previewImg.setVisibility(View.VISIBLE);previewBg.setVisibility(View.VISIBLE);noArtIcon.setVisibility(View.GONE);if(anim) previewImg.startAnimation(AnimationUtils.loadAnimation(this,R.anim.fade_in));});
                  }); imageThread.start();
              }

              private void showNoArt(){previewImg.setVisibility(View.GONE);previewBg.setVisibility(View.GONE);noArtIcon.setVisibility(View.VISIBLE);noArtIcon.setText(Config.PLATFORMS[platformIdx][4]);}
              private void schedulePreview(){if(previewRunnable!=null) handler.removeCallbacks(previewRunnable); previewRunnable=()->updatePreview(true); handler.postDelayed(previewRunnable,75);}

              private void startScrollLoop(int dir){
                  if(holding&&holdDir==dir) return; holdDir=dir; holding=true; holdStart=System.currentTimeMillis();
                  if(scrollRunnable!=null) handler.removeCallbacks(scrollRunnable);
                  scrollRunnable=new Runnable(){@Override public void run(){
                      if(!holding||holdDir!=dir) return;
                      long elapsed=System.currentTimeMillis()-holdStart;
                      long delay=elapsed<600?DELAY_SLOW:elapsed<1500?DELAY_MEDIUM:DELAY_FAST;
                      boolean moved=false;
                      if(dir<0&&selectedGame>0){selectedGame--;moved=true;}
                      else if(dir>0&&selectedGame<games.size()-1){selectedGame++;moved=true;}
                      if(moved){refreshList();schedulePreview();handler.postDelayed(this,delay);}else holding=false;
                  }}; handler.post(scrollRunnable);
              }
              private void stopScroll(){holding=false;holdDir=0;if(scrollRunnable!=null){handler.removeCallbacks(scrollRunnable);scrollRunnable=null;}}
              private boolean isInstalled(String pkg){try{getPackageManager().getPackageInfo(pkg,0);return true;}catch(Exception e){return false;}}

              private void launchGame(){
                  if(games.isEmpty()) return; GameItem g=games.get(selectedGame); String[] cfg=Config.PLATFORMS[platformIdx];
                  String path=cfg[1]+"/"+g.file; File rom=new File(path);
