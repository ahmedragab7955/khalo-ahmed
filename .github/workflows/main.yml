                  if(r1Pressed&&r2Pressed){stopScroll();if(exitDialog==null||!exitDialog.isShowing()){exitDialog=new ExitDialog(this,()->finishAffinity());exitDialog.show();}return true;}
                  switch(keyCode){
                      case KeyEvent.KEYCODE_DPAD_UP:    if(event.getRepeatCount()==0) startScrollLoop(-1); return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:  if(event.getRepeatCount()==0) startScrollLoop(1);  return true;
