          EOF

          cat > app/src/main/res/layout/item_recent.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="56dp">
              <View android:id="@+id/accentBar"
                  android:layout_width="3dp" android:layout_height="match_parent"
                  android:layout_alignParentStart="true"
                  android:background="@color/recent_color" android:visibility="invisible"/>
              <TextView android:id="@+id/itemIcon"
                  android:layout_width="32dp" android:layout_height="wrap_content"
                  android:layout_centerVertical="true" android:layout_marginStart="12dp"
                  android:textSize="18sp" android:gravity="center"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:layout_centerVertical="true" android:layout_toEndOf="@id/itemIcon"
                  android:layout_marginEnd="28dp" android:orientation="vertical">
                  <TextView android:id="@+id/itemName"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:textSize="14sp" android:ellipsize="end"
                      android:singleLine="true" android:fontFamily="sans-serif"/>
                  <TextView android:id="@+id/itemPlatform"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:textSize="10sp" android:fontFamily="monospace" android:layout_marginTop="2dp"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

      - name: Create Java Source Files
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/Config.java << 'EOF'
          package com.khaloahmed.launcher;
          public class Config {
              public static final String[][] PLATFORMS = {
                  {"PS1", "/storage/0CF6-106E/ps1", "com.epsxe.ePSXe",         ".bin,.iso,.img,.pbp,.cue", "🎮"},
                  {"PSP", "/storage/0CF6-106E/psp", "org.ppsspp.ppsspp",        ".iso,.cso,.pbp",           "🕹️"},
                  {"GBC", "/storage/0CF6-106E/gbc", "com.fastemulator.gbc", ".gbc,.gb,.zip",            "👾"},
              };
              public static final String[] IMAGE_EXTS = {".png",".jpg",".jpeg",".webp"};
              public static final String   PREFS_NAME = "khalo_prefs";
              public static final String   KEY_RECENT = "recent_games";
              public static final int      MAX_RECENT = 20;
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/GameItem.java << 'EOF'
          package com.khaloahmed.launcher;
          public class GameItem {
              public String name,file,artPath,platform;
              public GameItem(String name,String file,String artPath,String platform){
                  this.name=name;this.file=file;this.artPath=artPath;this.platform=platform;
              }
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/RecentEntry.java << 'EOF'
          package com.khaloahmed.launcher;
          public class RecentEntry {
              public String platform,file,name,artPath; public long timestamp;
              public RecentEntry(String platform,String file,String name,String artPath,long ts){
                  this.platform=platform;this.file=file;this.name=name;this.artPath=artPath;this.timestamp=ts;
              }
              public String serialize(){return platform+"|"+file+"|"+name+"|"+artPath+"|"+timestamp;}
              public static RecentEntry deserialize(String s){
                  String[] p=s.split("\\|",5); if(p.length<5) return null;
                  try{return new RecentEntry(p[0],p[1],p[2],p[3],Long.parseLong(p[4]));}catch(NumberFormatException e){return null;}
              }
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/RecentStore.java << 'EOF'
          package com.khaloahmed.launcher;
          import android.content.Context; import android.content.SharedPreferences;
          import java.util.ArrayList; import java.util.List;
          public class RecentStore {
              public static List<RecentEntry> load(Context ctx){
                  SharedPreferences p=ctx.getSharedPreferences(Config.PREFS_NAME,Context.MODE_PRIVATE);
                  String raw=p.getString(Config.KEY_RECENT,""); List<RecentEntry> list=new ArrayList<>();
                  if(raw.isEmpty()) return list;
                  for(String line:raw.split("\n")){if(line.trim().isEmpty()) continue; RecentEntry e=RecentEntry.deserialize(line.trim()); if(e!=null) list.add(e);}
                  return list;
              }
              public static void save(Context ctx,List<RecentEntry> list){
                  StringBuilder sb=new StringBuilder();
                  for(RecentEntry e:list) sb.append(e.serialize()).append("\n");
                  ctx.getSharedPreferences(Config.PREFS_NAME,Context.MODE_PRIVATE).edit().putString(Config.KEY_RECENT,sb.toString()).apply();
              }
              public static void record(Context ctx,GameItem g){
                  List<RecentEntry> list=load(ctx);
                  for(int i=list.size()-1;i>=0;i--){RecentEntry e=list.get(i);if(e.platform.equals(g.platform)&&e.file.equals(g.file)) list.remove(i);}
                  list.add(0,new RecentEntry(g.platform,g.file,g.name,g.artPath,System.currentTimeMillis()));
                  while(list.size()>Config.MAX_RECENT) list.remove(list.size()-1);
                  save(ctx,list);
              }
              public static void clear(Context ctx){ctx.getSharedPreferences(Config.PREFS_NAME,Context.MODE_PRIVATE).edit().remove(Config.KEY_RECENT).apply();}
