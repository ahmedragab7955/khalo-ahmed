                  final String path=e.artPath; final boolean anim=animate;
                  if(imageThread!=null&&imageThread.isAlive()) imageThread.interrupt();
                  imageThread=new Thread(()->{Bitmap bmp=BitmapFactory.decodeFile(path);if(bmp==null||Thread.currentThread().isInterrupted()) return;runOnUiThread(()->{previewImg.setImageBitmap(bmp);previewBg.setImageBitmap(bmp);previewImg.setVisibility(View.VISIBLE);previewBg.setVisibility(View.VISIBLE);noArtView.setVisibility(View.GONE);if(anim) previewImg.startAnimation(AnimationUtils.loadAnimation(this,R.anim.fade_in));});});
                  imageThread.start();
              }

              private void schedulePreview(){if(previewRunnable!=null) handler.removeCallbacks(previewRunnable); previewRunnable=()->updatePreview(true); handler.postDelayed(previewRunnable,75);}

              private void startScrollLoop(int dir){
                  if(holding&&holdDir==dir) return; holdDir=dir; holding=true; holdStart=System.currentTimeMillis();
                  if(scrollRunnable!=null) handler.removeCallbacks(scrollRunnable);
