          cat > app/src/main/java/com/khaloahmed/launcher/GamesActivity.java << 'EOF'
          package com.khaloahmed.launcher;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.content.pm.ResolveInfo;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.InputDevice;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.WindowManager;
          import android.view.animation.AnimationUtils;
          import android.widget.AdapterView;
          import android.widget.BaseAdapter;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ListView;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.core.content.FileProvider;

          import java.io.File;
          import java.util.List;

          public class GamesActivity extends Activity {
              private int platformIdx;
              private List<GameItem> games;
              private int selectedGame = 0;

              private boolean startPressed = false;
              private boolean selectPressed = false;
              private boolean holdUp = false;
              private boolean holdDown = false;
              private boolean joystickCentered = true;

              private ListView listView;
              private ImageView previewImg, previewBg;
              private TextView noArtIcon, previewTitle, previewSub, platformName, gameCount, statusText;

              private final Handler handler = new Handler(Looper.getMainLooper());
              private Runnable previewRunnable;

              private long holdStartTime = 0L;
              private long lastJoyMove = 0L;
              private static final long JOYSTICK_DELAY = 70L;

              private final Runnable holdScrollRunnable = new Runnable() {
                  @Override
                  public void run() {
                      if (!holdUp && !holdDown) return;
                      int step = getAcceleratedStep();
                      if (holdUp) moveSelection(-step, true);
                      if (holdDown) moveSelection(step, true);
                      handler.postDelayed(this, getHoldInterval());
                  }
              };

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);

                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);

                  setContentView(R.layout.activity_games);

                  platformIdx = getIntent().getIntExtra("platformIdx", 0);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  games = GameScanner.scan(cfg[0]);

                  listView = findViewById(R.id.gameList);
                  previewImg = findViewById(R.id.previewImg);
                  previewBg = findViewById(R.id.previewBg);
                  noArtIcon = findViewById(R.id.noArtIcon);
                  previewTitle = findViewById(R.id.previewTitle);
                  previewSub = findViewById(R.id.previewSub);
                  platformName = findViewById(R.id.platformName);
                  gameCount = findViewById(R.id.gameCount);
                  statusText = findViewById(R.id.statusText);

                  platformName.setText(cfg[0]);
                  gameCount.setText(games.size() + " GAMES");
                  statusText.setText(isAppInstalled(cfg[2]) ? "EMULATOR READY" : "EMULATOR NOT VISIBLE");

                  setupList();
                  updatePreview(false);
              }

              private void setupList() {
                  final GameAdapter adapter = new GameAdapter();
                  listView.setAdapter(adapter);

                  listView.setOnItemClickListener(new AdapterView.OnItemClickListener() {
                      @Override
                      public void onItemClick(AdapterView<?> parent, View view, int pos, long id) {
                          selectedGame = pos;
                          adapter.notifyDataSetChanged();
                          alignSelection(false);
                          schedulePreview(false);
                      }
                  });
              }

              private void alignSelection(boolean smooth) {
                  if (games.isEmpty()) return;
                  int offset = 120;
                  if (smooth) listView.smoothScrollToPositionFromTop(selectedGame, offset, 90);
                  else listView.setSelectionFromTop(selectedGame, offset);
              }

              private void schedulePreview(boolean animate) {
                  if (previewRunnable != null) handler.removeCallbacks(previewRunnable);

                  previewRunnable = new Runnable() {
                      @Override
                      public void run() {
                          updatePreview(animate);
                      }
                  };
                  handler.postDelayed(previewRunnable, 55);
              }

              private void updatePreview(boolean animate) {
                  if (games.isEmpty()) {
                      previewTitle.setText("لا توجد ألعاب");
                      previewSub.setText("ضع الرومات داخل المجلد الصحيح");
                      previewImg.setVisibility(View.GONE);
                      previewBg.setVisibility(View.GONE);
                      noArtIcon.setVisibility(View.VISIBLE);
                      noArtIcon.setText(Config.PLATFORMS[platformIdx][4]);
                      return;
                  }

                  GameItem g = games.get(selectedGame);
                  previewTitle.setText(g.name);
                  previewSub.setText(g.file);

                  Bitmap bmp = null;
                  if (g.artPath != null && !g.artPath.isEmpty()) {
                      try {
                          BitmapFactory.Options options = new BitmapFactory.Options();
                          options.inPreferredConfig = Bitmap.Config.RGB_565;
                          options.inDither = true;
                          bmp = BitmapFactory.decodeFile(g.artPath, options);
                      } catch (Exception ignored) { }
                  }

                  if (bmp != null) {
                      previewImg.setImageBitmap(bmp);
                      previewBg.setImageBitmap(bmp);
                      previewImg.setVisibility(View.VISIBLE);
                      previewBg.setVisibility(View.VISIBLE);
                      noArtIcon.setVisibility(View.GONE);

                      if (animate) {
                          previewImg.startAnimation(AnimationUtils.loadAnimation(this, R.anim.fade_in));
                      }
                  } else {
                      previewImg.setImageDrawable(null);
                      previewBg.setImageDrawable(null);
                      previewImg.setVisibility(View.GONE);
                      previewBg.setVisibility(View.GONE);
                      noArtIcon.setVisibility(View.VISIBLE);
                      noArtIcon.setText(Config.PLATFORMS[platformIdx][4]);
                  }
              }

              private boolean isAppInstalled(String packageName) {
                  try {
                      getPackageManager().getPackageInfo(packageName, PackageManager.GET_ACTIVITIES);
                      return true;
                  } catch (Exception e) {
                      return false;
                  }
              }

              private Intent getLaunchIntentSafely(String packageName) {
                  Intent launch = getPackageManager().getLaunchIntentForPackage(packageName);
                  if (launch != null) return launch;

                  Intent query = new Intent(Intent.ACTION_MAIN);
                  query.addCategory(Intent.CATEGORY_LAUNCHER);
                  query.setPackage(packageName);

                  List<ResolveInfo> infos = getPackageManager().queryIntentActivities(query, 0);
                  if (infos == null || infos.isEmpty()) return null;

                  ResolveInfo info = infos.get(0);
                  Intent explicit = new Intent(Intent.ACTION_MAIN);
                  explicit.setClassName(info.activityInfo.packageName, info.activityInfo.name);
                  return explicit;
              }

              private void launchGame() {
                  if (games.isEmpty()) return;

                  GameItem g = games.get(selectedGame);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  String packageName = cfg[2];
                  File romFile = new File(cfg[1], g.file);

                  if (!romFile.exists()) {
                      toast("ملف اللعبة غير موجود");
                      return;
                  }

                  Intent intent = getLaunchIntentSafely(packageName);
                  if (intent == null) {
                      toast("المحاكي غير ظاهر للتطبيق");
                      statusText.setText("CHECK MANIFEST / QUERIES");
                      return;
                  }

                  try {
                      Uri contentUri = FileProvider.getUriForFile(
                              this,
                              "com.khaloahmed.launcher.fileprovider",
                              romFile
                      );

                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      intent.addFlags(Intent.FLAG_GRANT_WRITE_URI_PERMISSION);
                      intent.setData(contentUri);
                      intent.setType("*/*");

                      String absolutePath = romFile.getAbsolutePath();
                      intent.putExtra("romPath", absolutePath);
                      intent.putExtra("path", absolutePath);
                      intent.putExtra("file", absolutePath);
                      intent.putExtra(Intent.EXTRA_STREAM, contentUri);

                      if ("com.epsxe.ePSXe".equals(packageName)) {
                          intent.putExtra("com.epsxe.ePSXe.ROM", absolutePath);
                          intent.putExtra("ROM", absolutePath);
                      }

                      if ("org.ppsspp.ppsspp".equals(packageName)) {
                          intent.putExtra("GamePath", absolutePath);
                          intent.putExtra("org.ppsspp.ppsspp.Shortcuts", absolutePath);
                      }

                      grantUriPermission(packageName, contentUri,
                              Intent.FLAG_GRANT_READ_URI_PERMISSION | Intent.FLAG_GRANT_WRITE_URI_PERMISSION);

                      startActivity(intent);
                      toast("جاري تشغيل اللعبة");

                  } catch (Exception e) {
                      e.printStackTrace();
                      toast("فشل تشغيل اللعبة");
                      statusText.setText("LAUNCH FAILED");
                  }
              }

              private void toast(String msg) {
                  Toast.makeText(this, msg, Toast.LENGTH_SHORT).show();
              }

              private void moveSelection(int delta, boolean smooth) {
                  if (games.isEmpty()) return;
                  int old = selectedGame;
                  selectedGame += delta;
                  if (selectedGame < 0) selectedGame = 0;
                  if (selectedGame > games.size() - 1) selectedGame = games.size() - 1;

                  if (selectedGame != old) {
                      ((GameAdapter) listView.getAdapter()).notifyDataSetChanged();
                      alignSelection(smooth);
                      schedulePreview(true);
                  }
              }

              private int getAcceleratedStep() {
                  long held = System.currentTimeMillis() - holdStartTime;
                  if (held > 1700) return 5;
                  if (held > 1100) return 3;
                  if (held > 550) return 2;
                  return 1;
              }

              private long getHoldInterval() {
                  long held = System.currentTimeMillis() - holdStartTime;
                  if (held > 1700) return 45;
                  if (held > 1100) return 60;
                  if (held > 550) return 80;
                  return 120;
              }

              private void startHold(boolean up) {
                  stopHold();
                  holdStartTime = System.currentTimeMillis();
                  holdUp = up;
                  holdDown = !up;
                  handler.postDelayed(holdScrollRunnable, 260);
              }

              private void stopHold() {
                  holdUp = false;
                  holdDown = false;
                  handler.removeCallbacks(holdScrollRunnable);
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START) startPressed = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;

                  if (startPressed && selectPressed) {
                      finish();
                      finishAffinity();
                      return true;
                  }

                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_UP:
                          if (event.getRepeatCount() == 0) {
                              moveSelection(-1, false);
                              startHold(true);
                          }
                          return true;

                      case KeyEvent.KEYCODE_DPAD_DOWN:
                          if (event.getRepeatCount() == 0) {
                              moveSelection(1, false);
                              startHold(false);
                          }
                          return true;

                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          launchGame();
                          return true;

                      case KeyEvent.KEYCODE_BUTTON_B:
                      case KeyEvent.KEYCODE_BACK:
                          finish();
                          overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
                          return true;
                  }

                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START) startPressed = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;

                  if (keyCode == KeyEvent.KEYCODE_DPAD_UP || keyCode == KeyEvent.KEYCODE_DPAD_DOWN) {
                      stopHold();
                      return true;
                  }

                  return super.onKeyUp(keyCode, event);
              }

              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                          && event.getAction() == MotionEvent.ACTION_MOVE) {

                      float y = event.getAxisValue(MotionEvent.AXIS_HAT_Y);
                      if (Math.abs(y) < 0.2f) y = event.getAxisValue(MotionEvent.AXIS_Y);

                      long now = System.currentTimeMillis();

                      if (Math.abs(y) < 0.45f) {
                          joystickCentered = true;
                          return true;
                      }

                      if (!joystickCentered || now - lastJoyMove < JOYSTICK_DELAY) return true;

                      joystickCentered = false;
                      lastJoyMove = now;

                      if (y < 0f) moveSelection(-1, true);
                      else moveSelection(1, true);

                      return true;
                  }

                  return super.onGenericMotionEvent(event);
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  stopHold();
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopHold();
                  if (previewRunnable != null) handler.removeCallbacks(previewRunnable);
              }

              @Override
              public void onBackPressed() {
                  finish();
                  overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
              }

              class GameAdapter extends BaseAdapter {
                  @Override
                  public int getCount() {
                      return games.size();
                  }

                  @Override
                  public Object getItem(int p) {
                      return games.get(p);
                  }

                  @Override
                  public long getItemId(int p) {
                      return p;
                  }

                  @Override
                  public View getView(int pos, View convertView, ViewGroup parent) {
                      if (convertView == null) {
                          convertView = getLayoutInflater().inflate(R.layout.item_game, parent, false);
                      }

                      GameItem g = games.get(pos);

                      TextView num = convertView.findViewById(R.id.gameNum);
                      TextView name = convertView.findViewById(R.id.gameName);
                      TextView file = convertView.findViewById(R.id.gameFile);
                      LinearLayout body = convertView.findViewById(R.id.itemBody);

                      num.setText(String.format("%02d", pos + 1));
                      name.setText(g.name);
                      file.setText(g.file);

                      boolean selected = (pos == selectedGame);

                      if (selected) {
                          body.setBackgroundResource(R.drawable.item_selected);
                          name.setTextColor(0xffffffff);
                          file.setTextColor(0xffB7C1DB);
                          num.setTextColor(0xff7C5CFF);
                          convertView.setAlpha(1f);
                      } else {
                          body.setBackgroundColor(0x00000000);
                          name.setTextColor(0xffD7DDF0);
                          file.setTextColor(0xff6E7A99);
                          num.setTextColor(0xff55627F);
                          convertView.setAlpha(0.86f);
                      }

                      return convertView;
                  }
              }
          }
