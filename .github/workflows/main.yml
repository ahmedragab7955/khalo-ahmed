name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create full Native project
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim
          mkdir -p app/src/main/res/xml

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34

              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "1.1"

                  vectorDrawables.useSupportLibrary = true
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      shrinkResources false
                      signingConfig signingConfigs.debug
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              packaging {
                  resources {
                      excludes += '/META-INF/{AL2.0,LGPL2.1}'
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>

              <queries>
                  <package android:name="com.epsxe.ePSXe"/>
                  <package android:name="org.ppsspp.ppsspp"/>
                  <package android:name="com.fastemulator.gbcfree"/>

                  <intent>
                      <action android:name="android.intent.action.MAIN"/>
                      <category android:name="android.intent.category.LAUNCHER"/>
                  </intent>

                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:mimeType="*/*"/>
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/AppTheme"
                  android:hardwareAccelerated="true"
                  android:largeHeap="false">

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.khaloahmed.launcher.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

                  <activity
                      android:name=".PlatformActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".GamesActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <root-path name="root" path="." />
              <external-path name="external" path="." />
