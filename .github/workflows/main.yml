name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets/launcher

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21; targetSdk 34
                  versionCode 1; versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false; signingConfig signingConfigs.debug }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KhaloAhmed" parent="android:Theme.NoTitleBar.Fullscreen"/>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>
              <application android:allowBackup="true" android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/Theme.KhaloAhmed">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/MainActivity.java << 'EOF'
          package com.khaloahmed.launcher;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.util.Log;
          import android.view.*;
          import android.webkit.*;
          import org.json.*;
          import java.io.*;
          import java.util.*;

          public class MainActivity extends Activity {
              private WebView webView;
              private long lastInput = 0;
              private static final long INPUT_DELAY = 200;
              private boolean startPressed = false;
              private boolean selectPressed = false;

              private static final Map<String,String[]> P = new LinkedHashMap<String,String[]>(){{
                  put("PS1", new String[]{"/storage/0CF6-106E/ps1","com.epsxe.ePSXe",".bin,.iso,.img,.pbp,.cue"});
                  put("PSP", new String[]{"/storage/0CF6-106E/psp","org.ppsspp.ppsspp",".iso,.cso,.pbp"});
                  put("GBC", new String[]{"/storage/0CF6-106E/gbc","com.fastemulator.gbcfree",".gbc,.gb,.zip"});
              }};
              private static final Set<String> IMG = new HashSet<>(Arrays.asList(".png",".jpg",".jpeg",".webp"));

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setDomStorageEnabled(true);
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.addJavascriptInterface(new Bridge(), "Android");
                  webView.loadUrl("file:///android_asset/launcher/index.html");
              }

              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                      && event.getAction() == MotionEvent.ACTION_MOVE) {
                      long now = System.currentTimeMillis();
                      if (now - lastInput < INPUT_DELAY) return true;
                      float x = event.getAxisValue(MotionEvent.AXIS_X);
                      float y = event.getAxisValue(MotionEvent.AXIS_Y);
                      float hatX = event.getAxisValue(MotionEvent.AXIS_HAT_X);
                      float hatY = event.getAxisValue(MotionEvent.AXIS_HAT_Y);
                      if      (x < -0.5f || hatX < -0.5f) { lastInput=now; sendKey("LEFT"); }
                      else if (x >  0.5f || hatX >  0.5f) { lastInput=now; sendKey("RIGHT"); }
                      else if (y < -0.5f || hatY < -0.5f) { lastInput=now; sendKey("UP"); }
                      else if (y >  0.5f || hatY >  0.5f) { lastInput=now; sendKey("DOWN"); }
                      return true;
                  }
                  return super.onGenericMotionEvent(event);
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;
                  if (startPressed && selectPressed) { finish(); return true; }

                  long now = System.currentTimeMillis();
                  if (now - lastInput < INPUT_DELAY) return true;

                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_UP:             lastInput=now; sendKey("UP");     return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:           lastInput=now; sendKey("DOWN");   return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:           lastInput=now; sendKey("LEFT");   return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:          lastInput=now; sendKey("RIGHT");  return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_BUTTON_X:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:         lastInput=now; sendKey("OK");     return true;
                      case KeyEvent.KEYCODE_BUTTON_B:
                      case KeyEvent.KEYCODE_BUTTON_Y:
                      case KeyEvent.KEYCODE_BACK:                lastInput=now; sendKey("BACK");   return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;
                  return super.onKeyUp(keyCode, event);
              }

              private void sendKey(final String key) {
                  runOnUiThread(new Runnable() {
                      @Override public void run() {
                          webView.evaluateJavascript("window.handleKey('" + key + "')", null);
                      }
                  });
              }

              class Bridge {
                  @JavascriptInterface
                  public String getGamesList() {
                      JSONArray games = new JSONArray();
                      try {
                          for (Map.Entry<String,String[]> e : P.entrySet()) {
                              String pl=e.getKey(), pa=e.getValue()[0], exStr=e.getValue()[2];
                              Set<String> exts = new HashSet<>(Arrays.asList(exStr.split(",")));
                              File dir = new File(pa);
                              if (!dir.exists()) continue;
                              File[] files = dir.listFiles();
                              if (files == null) continue;
                              Map<String,String> arts = new HashMap<>();
                              for (File f : files) {
                                  String n = f.getName().toLowerCase();
                                  for (String ie : IMG) {
                                      if (n.endsWith(ie)) arts.put(n.substring(0,n.lastIndexOf('.')), f.getAbsolutePath());
                                  }
                              }
                              for (File f : files) {
                                  if (!f.isFile()) continue;
                                  String nm=f.getName(), nl=nm.toLowerCase();
                                  boolean rom=false;
                                  for (String x : exts) { if (nl.endsWith(x.trim())) { rom=true; break; } }
                                  if (!rom) continue;
                                  String base = nm.contains(".") ? nm.substring(0,nm.lastIndexOf('.')) : nm;
                                  JSONObject o = new JSONObject();
                                  o.put("name", base.replaceAll("[_\\-]"," ").trim());
                                  o.put("platform", pl);
                                  o.put("file", nm);
                                  o.put("path", f.getAbsolutePath());
                                  o.put("art", arts.containsKey(base.toLowerCase()) ? arts.get(base.toLowerCase()) : "");
                                  games.put(o);
                              }
                          }
                      } catch (Exception ex) { ex.printStackTrace(); }
                      return games.toString();
                  }

                  @JavascriptInterface
                  public void launchGame(String pkg, String rom) {
                      try {
                          Intent i = getPackageManager().getLaunchIntentForPackage(pkg);
                          if (i == null) return;
                          i.setData(Uri.fromFile(new File(rom)));
                          i.putExtra("romPath", rom);
                          i.putExtra("com.epsxe.ePSXe.ROM", rom);
                          i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(i);
                      } catch (Exception ex) { ex.printStackTrace(); }
                  }
              }

              @Override
              public void onBackPressed() {
                  webView.evaluateJavascript("window.handleKey('BACK')", null);
              }
          }
          EOF

      - name: Create HTML Launcher
        run: |
          cat > app/src/main/assets/launcher/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head>
          <meta charset="UTF-8">
          <title>Khalo Ahmed</title>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700&display=swap');
            :root { --bg:#0d0d0d; --gold:#f0c040; --dim:#444; --card:#1a1a1a; }
            * { margin:0; padding:0; box-sizing:border-box; }
            body { background:var(--bg); color:#fff; font-family:'Cairo',sans-serif; height:100vh; overflow:hidden; }

            /* PLATFORM SCREEN */
            #ps {
              position:fixed; inset:0;
              display:flex; flex-direction:column;
              align-items:center; justify-content:center;
              background:radial-gradient(ellipse at center,#1a1a2e 0%,#0d0d0d 70%);
            }
            .logo {
              font-family:'Orbitron',monospace; font-size:2rem; font-weight:900;
              letter-spacing:8px; margin-bottom:60px;
              background:linear-gradient(135deg,#6488ff,#a070ff,var(--gold));
              -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            }
            .prow { display:flex; gap:50px; align-items:center; }
            .pi {
              display:flex; flex-direction:column; align-items:center; gap:14px;
              opacity:0.35; transition:all 0.2s; cursor:pointer;
            }
            .pi.sel { opacity:1; }
            .picon {
              width:110px; height:110px; border-radius:18px;
              background:#1a1a1a; border:3px solid transparent;
              display:flex; align-items:center; justify-content:center;
              font-size:2.8rem; transition:all 0.2s;
            }
            .pi.sel .picon {
              border-color:var(--gold);
              box-shadow:0 0 40px rgba(240,192,64,0.5);
              transform:scale(1.12);
            }
            .pname { font-family:'Orbitron',monospace; font-size:.9rem; letter-spacing:3px; color:var(--dim); }
            .pi.sel .pname { color:var(--gold); }
            .pcnt { font-size:.65rem; color:var(--dim); font-family:'Orbitron',monospace; }
            .pi.sel .pcnt { color:#999; }

            /* GAMES SCREEN */
            #gs { position:fixed; inset:0; display:none; }

            /* LEFT LIST */
            .gl {
              position:absolute; left:0; top:0; bottom:0; width:42%;
              background:#111;
              display:flex; flex-direction:column;
            }
            .glh {
              padding:28px 36px 18px; border-bottom:1px solid #222; flex-shrink:0;
            }
            .glh-plat { font-family:'Orbitron',monospace; font-size:.6rem; letter-spacing:4px; color:var(--gold); margin-bottom:4px; }
            .glh-cnt  { font-size:.7rem; color:var(--dim); font-family:'Orbitron',monospace; }
            .glist { flex:1; overflow-y:auto; overflow-x:hidden; }
            .glist::-webkit-scrollbar { display:none; }
            .gi {
              padding:13px 36px; border-left:4px solid transparent;
              display:flex; align-items:center; gap:14px;
              transition:all 0.12s; cursor:pointer;
            }
            .gi.sel { background:#1e1e1e; border-left-color:var(--gold); }
            .gi-num { font-family:'Orbitron',monospace; font-size:.55rem; color:var(--dim); width:22px; flex-shrink:0; }
            .gi.sel .gi-num { color:var(--gold); }
            .gi-name { font-size:1rem; color:#888; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
            .gi.sel .gi-name { color:#fff; font-size:1.15rem; font-weight:700; }

            /* RIGHT PREVIEW */
            .gp {
              position:absolute; left:42%; top:0; right:0; bottom:0;
              background:#000;
              display:flex; align-items:center; justify-content:center;
              overflow:hidden;
            }
            .gp-bg {
              position:absolute; inset:0;
              background-size:cover; background-position:center;
              filter:blur(25px) brightness(0.25);
              transition:background-image 0.3s;
            }
            .gp-img {
              position:relative; z-index:2;
              max-width:65%; max-height:72%;
              border-radius:10px;
              box-shadow:0 16px 50px rgba(0,0,0,0.9);
              object-fit:cover;
            }
            .gp-noart {
              position:relative; z-index:2;
              display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--dim);
            }
            .gp-noart .ico { font-size:4.5rem; }
            .gp-noart .lbl { font-family:'Orbitron',monospace; font-size:.65rem; letter-spacing:2px; }
            .gp-title {
              position:absolute; bottom:24px; left:0; right:0; z-index:3;
              text-align:center; font-size:1rem; font-weight:700;
              color:rgba(255,255,255,0.85);
              text-shadow:0 2px 8px rgba(0,0,0,0.9);
              padding:0 16px;
            }

            /* HINTS */
            .hints {
              position:fixed; bottom:0; left:0; right:0; z-index:200;
              padding:8px 30px; display:flex; gap:20px;
              font-family:'Orbitron',monospace; font-size:.58rem; letter-spacing:1px; color:var(--dim);
              background:linear-gradient(0deg,rgba(0,0,0,0.85),transparent);
            }
            .hk { background:#1a1a1a; border:1px solid #333; padding:1px 7px; border-radius:3px; margin-left:3px; }
          </style>
          </head><body>

          <div id="ps">
            <div class="logo">KHALO AHMED</div>
            <div class="prow" id="prow"></div>
          </div>

          <div id="gs">
            <div class="gl">
              <div class="glh">
                <div class="glh-plat" id="glplat"></div>
                <div class="glh-cnt"  id="glcnt"></div>
              </div>
              <div class="glist" id="glist"></div>
            </div>
            <div class="gp">
              <div class="gp-bg"    id="gpbg"></div>
              <img class="gp-img"   id="gpimg" src="" style="display:none">
              <div class="gp-noart" id="gpnoart"><div class="ico">🎮</div><div class="lbl">NO ART</div></div>
              <div class="gp-title" id="gptitle"></div>
            </div>
          </div>

          <div class="hints">
            <span><span class="hk">◀▶</span> تنقل</span>
            <span><span class="hk">X / OK</span> دخول</span>
            <span><span class="hk">○ / BACK</span> رجوع</span>
            <span><span class="hk">START+SELECT</span> خروج</span>
          </div>

          <script>
          var PLATS = [
            {key:'PS1', icon:'🎮', emu:'com.epsxe.ePSXe',       path:'/storage/0CF6-106E/ps1'},
            {key:'PSP', icon:'🕹️', emu:'org.ppsspp.ppsspp',      path:'/storage/0CF6-106E/psp'},
            {key:'GBC', icon:'👾', emu:'com.fastemulator.gbcfree',path:'/storage/0CF6-106E/gbc'}
          ];
          var DEMO = {
            PS1:[{name:'Final Fantasy VII',file:'ff7.bin',art:''},{name:'Crash Bandicoot',file:'crash.bin',art:''},{name:'Tekken 3',file:'tekken3.bin',art:''}],
            PSP:[{name:'God of War',file:'gow.iso',art:''},{name:'Monster Hunter',file:'mhf.iso',art:''}],
            GBC:[{name:'Pokemon Red',file:'pokered.gbc',art:''},{name:'Zelda',file:'zelda.gbc',art:''}]
          };

          var games = {};
          var scr = 'P'; // P=platform, G=games
          var pi = 0;    // platform index
          var gi = 0;    // game index

          function init() {
            // load games
            try {
              if (window.Android && window.Android.getGamesList) {
                var raw = JSON.parse(window.Android.getGamesList());
                PLATS.forEach(function(p){ games[p.key]=[]; });
                raw.forEach(function(g){ if(games[g.platform]) games[g.platform].push(g); });
                PLATS.forEach(function(p){ if(!games[p.key].length) games[p.key]=DEMO[p.key]||[]; });
              } else {
                PLATS.forEach(function(p){ games[p.key]=DEMO[p.key]||[]; });
              }
            } catch(e) {
              PLATS.forEach(function(p){ games[p.key]=DEMO[p.key]||[]; });
            }
            drawPlatforms();
          }

          function drawPlatforms() {
            var html = '';
            PLATS.forEach(function(p, i) {
              var cnt = (games[p.key]||[]).length;
              html += '<div class="pi'+(i===pi?' sel':'')+'" onclick="clickPlatform('+i+')">'
                    + '<div class="picon">'+p.icon+'</div>'
                    + '<div class="pname">'+p.key+'</div>'
                    + '<div class="pcnt">'+cnt+' GAMES</div>'
                    + '</div>';
            });
            document.getElementById('prow').innerHTML = html;
          }

          function clickPlatform(i) {
            pi = i; gi = 0;
            scr = 'G';
            document.getElementById('ps').style.display = 'none';
            document.getElementById('gs').style.display = 'block';
            drawGames();
          }

          function drawGames() {
            var p = PLATS[pi];
            var list = games[p.key] || [];
            document.getElementById('glplat').textContent = p.key;
            document.getElementById('glcnt').textContent  = list.length + ' GAMES';

            var html = '';
            list.forEach(function(g, i) {
              html += '<div class="gi'+(i===gi?' sel':'')+'" id="gi'+i+'" onclick="clickGame('+i+')">'
                    + '<div class="gi-num">'+String(i+1).padStart(2,'0')+'</div>'
                    + '<div class="gi-name">'+g.name+'</div>'
                    + '</div>';
            });
            document.getElementById('glist').innerHTML = html;
            scrollToGame();
            drawPreview();
          }

          function scrollToGame() {
            var el = document.getElementById('gi'+gi);
            if (el) el.scrollIntoView({block:'nearest', behavior:'smooth'});
          }

          function drawPreview() {
            var p    = PLATS[pi];
            var list = games[p.key] || [];
            var g    = list[gi];
            if (!g) return;

            document.getElementById('gptitle').textContent = g.name;

            var img    = document.getElementById('gpimg');
            var noart  = document.getElementById('gpnoart');
            var bg     = document.getElementById('gpbg');

            if (g.art) {
              var src = 'file://' + g.art;
              img.onload  = function(){ img.style.display='block'; noart.style.display='none'; };
              img.onerror = function(){ img.style.display='none';  noart.style.display='flex'; };
              img.src = src;
              bg.style.backgroundImage = 'url("' + src + '")';
            } else {
              img.style.display   = 'none';
              noart.style.display = 'flex';
              bg.style.backgroundImage = 'none';
              noart.innerHTML = '<div class="ico">'+p.icon+'</div><div class="lbl">NO ART</div>';
            }
          }

          function clickGame(i) {
            gi = i;
            drawGames();
          }

          function launchGame() {
            var p    = PLATS[pi];
            var list = games[p.key] || [];
            var g    = list[gi];
            if (!g || !g.file) return;
            if (window.Android) window.Android.launchGame(p.emu, p.path + '/' + g.file);
          }

          // Called from Java
          window.handleKey = function(key) {
            if (scr === 'P') {
              if (key === 'LEFT')  { pi = Math.max(0, pi-1); drawPlatforms(); }
              if (key === 'RIGHT') { pi = Math.min(PLATS.length-1, pi+1); drawPlatforms(); }
              if (key === 'OK')    { clickPlatform(pi); }
            } else {
              var list = games[PLATS[pi].key] || [];
              if (key === 'UP')   { gi = Math.max(0, gi-1); drawGames(); }
              if (key === 'DOWN') { gi = Math.min(list.length-1, gi+1); drawGames(); }
              if (key === 'OK')   { launchGame(); }
              if (key === 'BACK') {
                scr = 'P';
                document.getElementById('gs').style.display = 'none';
                document.getElementById('ps').style.display = 'flex';
                drawPlatforms();
              }
            }
          };

          init();
          </script>
          </body></html>
          HTMLEOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KhaloAhmed-APK
          path: app/build/outputs/apk/release/app-release*.apk
