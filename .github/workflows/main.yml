              private void updatePreview(boolean animate){
                  if(entries.isEmpty()){noArtView.setVisibility(View.VISIBLE);noArtView.setText("🕐");previewTitle.setText("لا يوجد تاريخ");platformBadge.setVisibility(View.GONE);return;}
                  RecentEntry e=entries.get(selectedIdx); previewTitle.setText(e.name);
