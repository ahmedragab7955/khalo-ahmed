                  for(String act:new String[]{"com.fastemulator.gbc.RomListActivity","com.fastemulator.gbc.EmulatorActivity","com.fastemulator.gbc.EmulatorActivity"}){
                      try{Intent i=new Intent(Intent.ACTION_MAIN);i.setComponent(new ComponentName("com.fastemulator.gbc",act));i.putExtra("PATH",path);i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK|Intent.FLAG_ACTIVITY_CLEAR_TOP);startActivity(i);return;}catch(Exception ignored){}
