          package com.khaloahmed.launcher;
          import java.io.File; import java.util.*;
          public class GameScanner {
              public static List<GameItem> scan(String platformKey){
                  List<GameItem> result=new ArrayList<>(); String[] cfg=null;
                  for(String[] p:Config.PLATFORMS){if(p[0].equals(platformKey)){cfg=p;break;}} if(cfg==null) return result;
                  File dir=new File(cfg[1]); if(!dir.exists()||!dir.isDirectory()) return result;
                  File[] files=dir.listFiles(); if(files==null) return result;
                  Set<String> exts=new HashSet<>(Arrays.asList(cfg[3].split(",")));
                  Map<String,String> artMap=new HashMap<>();
                  for(File f:files){String n=f.getName().toLowerCase();for(String ie:Config.IMAGE_EXTS){if(n.endsWith(ie)) artMap.put(n.substring(0,n.lastIndexOf('.')),f.getAbsolutePath());}}
                  for(File f:files){
                      if(!f.isFile()) continue; String nm=f.getName(),nl=nm.toLowerCase(); boolean isRom=false;
                      for(String x:exts){if(nl.endsWith(x.trim())){isRom=true;break;}} if(!isRom) continue;
                      String base=nm.contains(".")?nm.substring(0,nm.lastIndexOf('.')):nm;
                      String display=base.replaceAll("[_\\-]+"," ").trim();
                      String art=artMap.getOrDefault(base.toLowerCase(),"");
                      result.add(new GameItem(display,nm,art,platformKey));
                  }
                  Collections.sort(result,(a,b)->a.name.compareToIgnoreCase(b.name)); return result;
              }
              public static GameItem resolve(RecentEntry e){
                  String[] cfg=null; for(String[] p:Config.PLATFORMS){if(p[0].equals(e.platform)){cfg=p;break;}} if(cfg==null) return null;
                  File f=new File(cfg[1]+"/"+e.file); if(!f.exists()) return null;
                  return new GameItem(e.name,e.file,e.artPath,e.platform);
              }
          }
