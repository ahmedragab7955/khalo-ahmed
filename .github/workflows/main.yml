          EOF

      - name: Create Java Source Files
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/Config.java << 'EOF'
          package com.khaloahmed.launcher;

          public class Config {
              // { PlatformName, FolderPath, EmulatorPackage, Extensions, Icon }
              public static final String[][] PLATFORMS = {
                  {"PS1",  "/storage/0CF6-106E/ps1", "com.epsxe.ePSXe",         ".bin,.iso,.img,.pbp,.cue", "🎮"},
                  {"PSP",  "/storage/0CF6-106E/psp", "org.ppsspp.ppsspp",        ".iso,.cso,.pbp",           "🕹️"},
                  {"GBC",  "/storage/0CF6-106E/gbc", "com.fastemulator.gbcfree", ".gbc,.gb,.zip",            "👾"},
              };

              public static final String[] IMAGE_EXTS = {".png", ".jpg", ".jpeg", ".webp"};
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/GameItem.java << 'EOF'
          package com.khaloahmed.launcher;

          public class GameItem {
              public String name, file, artPath, platform;

              public GameItem(String name, String file, String artPath, String platform) {
                  this.name = name;
                  this.file = file;
                  this.artPath = artPath;
                  this.platform = platform;
              }
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/GameScanner.java << 'EOF'
          package com.khaloahmed.launcher;

          import java.io.File;
          import java.util.*;

          public class GameScanner {
              public static List<GameItem> scan(String platformKey) {
                  List<GameItem> result = new ArrayList<>();
                  String[] cfg = null;

                  for (String[] p : Config.PLATFORMS) {
                      if (p[0].equals(platformKey)) { cfg = p; break; }
                  }
                  if (cfg == null) return result;

                  File dir = new File(cfg[1]);
                  if (!dir.exists() || !dir.isDirectory()) return result;

                  File[] files = dir.listFiles();
                  if (files == null) return result;

                  Set<String> exts = new HashSet<>(Arrays.asList(cfg[3].split(",")));

                  // Build art map: basename (lowercase) -> full path
                  Map<String, String> artMap = new HashMap<>();
                  for (File f : files) {
                      String n = f.getName().toLowerCase();
                      for (String ie : Config.IMAGE_EXTS) {
                          if (n.endsWith(ie)) {
                              artMap.put(n.substring(0, n.lastIndexOf('.')), f.getAbsolutePath());
                          }
                      }
                  }

                  for (File f : files) {
                      if (!f.isFile()) continue;
                      String nm = f.getName();
                      String nl = nm.toLowerCase();
                      boolean isRom = false;
                      for (String x : exts) {
                          if (nl.endsWith(x.trim())) { isRom = true; break; }
                      }
                      if (!isRom) continue;

                      String base = nm.contains(".") ? nm.substring(0, nm.lastIndexOf('.')) : nm;
                      String display = base.replaceAll("[_\\-]+", " ").trim();
                      String art = artMap.containsKey(base.toLowerCase()) ? artMap.get(base.toLowerCase()) : "";

                      result.add(new GameItem(display, nm, art, platformKey));
                  }

                  Collections.sort(result, (a, b) -> a.name.compareToIgnoreCase(b.name));
                  return result;
              }
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/PlatformActivity.java << 'EOF'
          package com.khaloahmed.launcher;

          import android.app.Activity;
          import android.content.Intent;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.InputDevice;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.view.animation.Animation;
          import android.view.animation.AnimationUtils;
          import android.view.animation.ScaleAnimation;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          import java.util.List;

          public class PlatformActivity extends Activity {
              private int selectedIdx = 0;
              private boolean startPressed = false, selectPressed = false;
              private LinearLayout platformRow;
              private int[] gameCounts;
              private long lastMoveTime = 0;
              private static final long MOVE_DELAY = 130;

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);

                  setContentView(R.layout.activity_platform);
                  platformRow = findViewById(R.id.platformRow);

                  // Pre-count games for each platform
                  gameCounts = new int[Config.PLATFORMS.length];
                  for (int i = 0; i < Config.PLATFORMS.length; i++) {
                      gameCounts[i] = GameScanner.scan(Config.PLATFORMS[i][0]).size();
                  }

                  drawPlatforms(true);
              }

              private void drawPlatforms(boolean animate) {
                  platformRow.removeAllViews();

                  for (int i = 0; i < Config.PLATFORMS.length; i++) {
                      String[] p = Config.PLATFORMS[i];
                      boolean sel = (i == selectedIdx);

                      LinearLayout card = new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);
                      card.setGravity(Gravity.CENTER);

                      int cardSize = sel ? 230 : 195;
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(cardSize, cardSize);
                      lp.setMargins(24, 0, 24, 0);
                      card.setLayoutParams(lp);
                      card.setPadding(12, 12, 12, 12);

                      GradientDrawable gd = new GradientDrawable();
                      gd.setCornerRadius(26f);
                      if (sel) {
                          gd.setColor(0xff16163a);
                          gd.setStroke(3, 0xff7c5cbf);
                          card.setBackground(gd);
                          card.setElevation(28f);
                          card.setAlpha(1.0f);
                      } else {
                          gd.setColor(0xff0f0f23);
                          gd.setStroke(1, 0xff1a1a35);
                          card.setBackground(gd);
                          card.setElevation(2f);
                          card.setAlpha(0.4f);
                      }

                      // Emoji icon
                      TextView icon = new TextView(this);
                      icon.setText(p[4]);
                      icon.setTextSize(sel ? 44 : 34);
                      icon.setGravity(Gravity.CENTER);
                      card.addView(icon);

                      // Platform name
                      TextView name = new TextView(this);
                      name.setText(p[0]);
                      name.setTextSize(sel ? 15 : 12);
                      name.setTextColor(sel ? 0xfff0c040 : 0xff445070);
                      name.setGravity(Gravity.CENTER);
                      name.setTypeface(Typeface.MONOSPACE, Typeface.BOLD);
                      name.setLetterSpacing(0.18f);
                      name.setPadding(0, 6, 0, 0);
                      card.addView(name);

                      // Game count
                      TextView count = new TextView(this);
                      count.setText(gameCounts[i] + " GAMES");
                      count.setTextSize(9);
                      count.setTextColor(sel ? 0xff7c5cbf : 0xff2a2a45);
                      count.setGravity(Gravity.CENTER);
                      count.setTypeface(Typeface.MONOSPACE);
                      count.setPadding(0, 3, 0, 0);
                      card.addView(count);

                      final int idx = i;
                      card.setOnClickListener(v -> openPlatform(idx));

                      platformRow.addView(card);

                      // Animate selected card popping in
                      if (sel && animate) {
                          Animation pop = AnimationUtils.loadAnimation(this, R.anim.pop_in);
                          card.startAnimation(pop);
                      }
                  }
              }

              private void openPlatform(int idx) {
                  selectedIdx = idx;
                  Intent intent = new Intent(this, GamesActivity.class);
                  intent.putExtra("platformIdx", idx);
                  startActivity(intent);
                  overridePendingTransition(R.anim.slide_in_right, R.anim.slide_out_left);
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START) startPressed = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;
                  if (startPressed && selectPressed) { finish(); return true; }

                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_LEFT:
                          if (selectedIdx > 0) { selectedIdx--; drawPlatforms(true); }
                          return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:
                          if (selectedIdx < Config.PLATFORMS.length - 1) { selectedIdx++; drawPlatforms(true); }
                          return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          openPlatform(selectedIdx);
                          return true;
                      case KeyEvent.KEYCODE_BACK:
                      case KeyEvent.KEYCODE_BUTTON_B:
                          finish();
                          return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START) startPressed = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;
                  return super.onKeyUp(keyCode, event);
              }

              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                          && event.getAction() == MotionEvent.ACTION_MOVE) {
                      long now = System.currentTimeMillis();
                      if (now - lastMoveTime < MOVE_DELAY) return true;
                      float x = event.getAxisValue(MotionEvent.AXIS_X);
                      float hatX = event.getAxisValue(MotionEvent.AXIS_HAT_X);
                      if (x < -0.5f || hatX < -0.5f) {
                          if (selectedIdx > 0) { selectedIdx--; lastMoveTime = now; drawPlatforms(true); }
                      } else if (x > 0.5f || hatX > 0.5f) {
                          if (selectedIdx < Config.PLATFORMS.length - 1) { selectedIdx++; lastMoveTime = now; drawPlatforms(true); }
                      }
                      return true;
                  }
                  return super.onGenericMotionEvent(event);
              }
          }
          EOF

          cat > app/src/main/java/com/khaloahmed/launcher/GamesActivity.java << 'EOF'
          package com.khaloahmed.launcher;

          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.StrictMode;
          import android.view.InputDevice;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.WindowManager;
          import android.view.animation.Animation;
          import android.view.animation.AnimationUtils;
          import android.widget.AdapterView;
          import android.widget.BaseAdapter;
          import android.widget.ImageView;
          import android.widget.ListView;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.io.File;
          import java.util.List;

          public class GamesActivity extends Activity {
              private int platformIdx;
              private List<GameItem> games;
              private int selectedGame = 0;
              private boolean startPressed = false, selectPressed = false;

              private ListView listView;
              private ImageView previewImg, previewBg;
              private TextView noArtIcon, previewTitle, platformName, gameCount;

              private Handler handler = new Handler();
              private Runnable previewRunnable;
              private Thread imageThread;

              private long lastInput = 0;

              // ── Adaptive scroll speed ──────────────────────────────────────────────
              // Returns the minimum ms between scroll steps based on hold duration.
              private long scrollDelay(int repeat) {
                  if (repeat == 0) return 160;
                  if (repeat < 4)  return 110;
                  if (repeat < 10) return 65;
                  if (repeat < 20) return 38;
                  return 22;
              }

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);

                  // Allow file:// URIs for emulator launch (fixes Android 7+)
                  StrictMode.setVmPolicy(new StrictMode.VmPolicy.Builder().build());

                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);

                  setContentView(R.layout.activity_games);

                  platformIdx = getIntent().getIntExtra("platformIdx", 0);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  games = GameScanner.scan(cfg[0]);

                  listView    = findViewById(R.id.gameList);
                  previewImg  = findViewById(R.id.previewImg);
                  previewBg   = findViewById(R.id.previewBg);
                  noArtIcon   = findViewById(R.id.noArtIcon);
                  previewTitle= findViewById(R.id.previewTitle);
                  platformName= findViewById(R.id.platformName);
                  gameCount   = findViewById(R.id.gameCount);

                  platformName.setText(cfg[0]);
                  gameCount.setText(games.size() + " GAMES");

                  setupList();
                  updatePreview(false);
              }

              private void setupList() {
                  GameAdapter adapter = new GameAdapter();
                  listView.setAdapter(adapter);
                  listView.setOnItemClickListener((parent, view, pos, id) -> {
                      selectedGame = pos;
                      adapter.notifyDataSetChanged();
                      listView.setSelection(pos);
                      updatePreview(true);
                  });
              }

              // ── Async preview loading ──────────────────────────────────────────────
              private void updatePreview(boolean animate) {
                  if (games.isEmpty()) {
                      showNoArt();
                      previewTitle.setText("لا توجد ألعاب");
                      return;
                  }

                  GameItem g = games.get(selectedGame);
                  previewTitle.setText(g.name);

                  if (g.artPath.isEmpty() || !new File(g.artPath).exists()) {
                      showNoArt();
                      return;
                  }

                  final String artPath = g.artPath;
                  final boolean doAnim = animate;

                  // Cancel previous load
                  if (imageThread != null && imageThread.isAlive()) imageThread.interrupt();

                  imageThread = new Thread(() -> {
                      BitmapFactory.Options opts = new BitmapFactory.Options();
                      opts.inSampleSize = 1;
                      Bitmap bmp = BitmapFactory.decodeFile(artPath, opts);

                      if (bmp == null || Thread.currentThread().isInterrupted()) return;

                      runOnUiThread(() -> {
                          previewImg.setImageBitmap(bmp);
                          previewBg.setImageBitmap(bmp);
                          previewImg.setVisibility(View.VISIBLE);
                          previewBg.setVisibility(View.VISIBLE);
                          noArtIcon.setVisibility(View.GONE);
                          if (doAnim) {
                              Animation fade = AnimationUtils.loadAnimation(this, R.anim.fade_in);
                              previewImg.startAnimation(fade);
                          }
                      });
                  });
                  imageThread.start();
              }

              private void showNoArt() {
                  previewImg.setVisibility(View.GONE);
                  previewBg.setVisibility(View.GONE);
                  noArtIcon.setVisibility(View.VISIBLE);
                  noArtIcon.setText(Config.PLATFORMS[platformIdx][4]);
              }

              private void schedulePreview() {
                  if (previewRunnable != null) handler.removeCallbacks(previewRunnable);
                  previewRunnable = () -> updatePreview(true);
                  handler.postDelayed(previewRunnable, 90);
              }

              // ── Emulator Launch (FIXED) ────────────────────────────────────────────
              private boolean isInstalled(String pkg) {
                  try { getPackageManager().getPackageInfo(pkg, 0); return true; }
                  catch (Exception e) { return false; }
              }

              private void launchGame() {
                  if (games.isEmpty()) return;

                  GameItem g = games.get(selectedGame);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  String romPath = cfg[1] + "/" + g.file;
                  File romFile = new File(romPath);

                  if (!romFile.exists()) {
                      toast("ملف اللعبة غير موجود ❌");
                      return;
                  }

                  String pkg = cfg[2];

                  if (!isInstalled(pkg)) {
                      toast("المحاكي غير مثبت: " + pkg);
                      return;
                  }

                  try {
                      Intent intent = buildIntent(pkg, romFile, romPath);
                      if (intent != null) {
                          startActivity(intent);
                      } else {
                          toast("تعذر فتح اللعبة");
                      }
                  } catch (Exception e) {
                      // Fallback: open emulator directly without ROM
                      try {
                          Intent fallback = getPackageManager().getLaunchIntentForPackage(pkg);
                          if (fallback != null) startActivity(fallback);
                          else toast("خطأ في التشغيل");
                      } catch (Exception ex) {
                          toast("خطأ في التشغيل");
                      }
                  }
              }

              private Intent buildIntent(String pkg, File romFile, String romPath) {
                  Uri fileUri = Uri.fromFile(romFile);
                  Intent i;

                  switch (pkg) {
                      // ── ePSXe PS1 ──────────────────────────────────────────────────
                      case "com.epsxe.ePSXe": {
                          // Primary method: direct class with ROM extra
                          i = new Intent(Intent.ACTION_MAIN);
                          i.setComponent(new ComponentName("com.epsxe.ePSXe", "com.epsxe.ePSXe.ePSXe"));
                          i.putExtra("com.epsxe.ePSXe.ROM", romPath);
                          i.putExtra("ROM", romPath);
                          i.setData(fileUri);
                          i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                          return i;
                      }

                      // ── PPSSPP PSP ─────────────────────────────────────────────────
                      case "org.ppsspp.ppsspp": {
                          // Primary method: shortcut via PpssppActivity
                          i = new Intent(Intent.ACTION_MAIN);
                          i.setComponent(new ComponentName("org.ppsspp.ppsspp", "org.ppsspp.ppsspp.PpssppActivity"));
                          i.putExtra("org.ppsspp.ppsspp.Shortcuts", romPath);
                          i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                          return i;
                      }

                      // ── GBC / Generic ──────────────────────────────────────────────
                      default: {
                          i = new Intent(Intent.ACTION_VIEW);
                          i.setPackage(pkg);
                          i.setDataAndType(fileUri, "*/*");
                          i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          return i;
                      }
                  }
              }

              private void toast(String msg) {
                  Toast.makeText(this, msg, Toast.LENGTH_SHORT).show();
              }

              private void refreshList() {
                  ((GameAdapter) listView.getAdapter()).notifyDataSetChanged();
                  listView.setSelection(selectedGame);
              }

              // ── Key handling with adaptive scroll speed ────────────────────────────
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START) startPressed = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;

                  if (startPressed && selectPressed) {
                      finishAffinity();
                      return true;
                  }

                  long now = System.currentTimeMillis();
                  int repeat = event.getRepeatCount();

                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_UP:
                          if (now - lastInput < scrollDelay(repeat)) return true;
                          if (selectedGame > 0) {
                              lastInput = now;
                              selectedGame--;
                              refreshList();
                              schedulePreview();
                          }
                          return true;

                      case KeyEvent.KEYCODE_DPAD_DOWN:
                          if (now - lastInput < scrollDelay(repeat)) return true;
                          if (selectedGame < games.size() - 1) {
                              lastInput = now;
                              selectedGame++;
                              refreshList();
                              schedulePreview();
                          }
                          return true;

                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          if (repeat == 0) { lastInput = now; launchGame(); }
                          return true;

                      case KeyEvent.KEYCODE_BUTTON_B:
                      case KeyEvent.KEYCODE_BACK:
                          finish();
                          overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
                          return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START) startPressed = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;
                  return super.onKeyUp(keyCode, event);
              }

              // ── Joystick with adaptive speed ───────────────────────────────────────
              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                          && event.getAction() == MotionEvent.ACTION_MOVE) {

                      long now = System.currentTimeMillis();
                      float y = event.getAxisValue(MotionEvent.AXIS_Y);
                      float hatY = event.getAxisValue(MotionEvent.AXIS_HAT_Y);

                      long elapsed = now - lastInput;

                      // Speed tiers based on how long stick is held
                      long delay;
                      if (elapsed < 400)       delay = 120;
                      else if (elapsed < 1000) delay = 70;
                      else                     delay = 30;

                      if (y < -0.5f || hatY < -0.5f) {
                          if (now - lastInput < delay) return true;
                          if (selectedGame > 0) {
                              lastInput = now;
                              selectedGame--;
                              refreshList();
                              schedulePreview();
                          }
                      } else if (y > 0.5f || hatY > 0.5f) {
                          if (now - lastInput < delay) return true;
                          if (selectedGame < games.size() - 1) {
                              lastInput = now;
                              selectedGame++;
                              refreshList();
                              schedulePreview();
                          }
                      }
                      return true;
                  }
                  return super.onGenericMotionEvent(event);
              }

              @Override
              public void onBackPressed() {
                  finish();
                  overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (imageThread != null) imageThread.interrupt();
                  handler.removeCallbacksAndMessages(null);
              }

              // ── Game List Adapter with ViewHolder ──────────────────────────────────
              class GameAdapter extends BaseAdapter {
                  @Override public int getCount() { return games.size(); }
                  @Override public Object getItem(int p) { return games.get(p); }
                  @Override public long getItemId(int p) { return p; }

                  @Override
                  public View getView(int pos, View cv, ViewGroup parent) {
                      ViewHolder vh;
                      if (cv == null) {
                          cv = getLayoutInflater().inflate(R.layout.item_game, parent, false);
                          vh = new ViewHolder();
                          vh.num     = cv.findViewById(R.id.gameNum);
                          vh.name    = cv.findViewById(R.id.gameName);
                          vh.accent  = cv.findViewById(R.id.accentBar);
                          cv.setTag(vh);
                      } else {
                          vh = (ViewHolder) cv.getTag();
                      }

                      GameItem g = games.get(pos);
                      boolean sel = (pos == selectedGame);

                      vh.num.setText(String.format("%02d", pos + 1));
                      vh.name.setText(g.name);

                      if (sel) {
                          cv.setBackgroundColor(0xff16163a);
                          vh.name.setTextColor(0xffffffff);
                          vh.name.setTextSize(15f);
                          vh.num.setTextColor(0xff7c5cbf);
                          vh.accent.setVisibility(View.VISIBLE);
                      } else {
                          cv.setBackgroundColor(0x00000000);
                          vh.name.setTextColor(0xff5a6a8a);
                          vh.name.setTextSize(13.5f);
                          vh.num.setTextColor(0xff2c3550);
                          vh.accent.setVisibility(View.INVISIBLE);
                      }

                      return cv;
                  }

                  class ViewHolder {
                      TextView num, name;
                      View accent;
                  }
              }
          }
          EOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KhaloAhmed-APK
          path: app/build/outputs/apk/release/app-release*.apk
