                      <TextView android:id="@+id/fixedArrow"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:layout_alignParentEnd="true" android:layout_centerVertical="true"
                          android:text="&#9664;" android:textColor="@color/recent_color"
                          android:textSize="14sp" android:paddingEnd="8dp"/>
                  </RelativeLayout>
              </LinearLayout>

              <FrameLayout android:layout_width="0dp" android:layout_height="match_parent"
                  android:layout_weight="62" android:background="#000000">
                  <ImageView android:id="@+id/recentPreviewBg"
                      android:layout_width="match_parent" android:layout_height="match_parent"
                      android:scaleType="centerCrop" android:alpha="0.22"/>
                  <ImageView android:id="@+id/recentPreviewImg"
                      android:layout_width="wrap_content" android:layout_height="match_parent"
                      android:layout_gravity="center" android:scaleType="fitCenter"
                      android:adjustViewBounds="true" android:padding="26dp"/>
                  <TextView android:id="@+id/recentNoArt"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_gravity="center" android:textSize="88sp" android:visibility="gone"/>
                  <TextView android:id="@+id/platformBadge"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_gravity="top|start" android:layout_margin="12dp"
                      android:paddingStart="10dp" android:paddingEnd="10dp"
                      android:paddingTop="4dp" android:paddingBottom="4dp"
                      android:textColor="#ffffff" android:textSize="9sp"
                      android:textStyle="bold" android:fontFamily="monospace"
                      android:background="#cc1a8fff"/>
                  <TextView android:id="@+id/recentPreviewTitle"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:layout_gravity="bottom" android:paddingStart="20dp" android:paddingEnd="20dp"
                      android:paddingTop="26dp" android:paddingBottom="16dp"
                      android:textColor="#ffffff" android:textSize="18sp" android:textStyle="bold"
