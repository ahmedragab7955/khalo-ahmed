name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21
                  targetSdk 34
                  versionCode 5
                  versionName "5.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create Manifest and Resources
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>

              <queries>
                  <package android:name="com.epsxe.ePSXe"/>
                  <package android:name="org.ppsspp.ppsspp"/>
                  <package android:name="com.fastemulator.gbc"/>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:mimeType="*/*"/>
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name=".PlatformActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <activity android:name=".GamesActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape"/>

                  <activity android:name=".RecentActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/drawable/bg_gradient.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:type="linear" android:angle="135"
                  android:startColor="#030d1f"
                  android:centerColor="#061733"
                  android:endColor="#0a2650"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/bg_left_panel.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:type="linear" android:angle="180"
                  android:startColor="#04101e" android:endColor="#071628"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/bg_header.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:type="linear" android:angle="0"
                  android:startColor="#04101e" android:endColor="#0a2255"/>
          </shape>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#030d1f</color>
              <color name="bg_card">#071628</color>
              <color name="bg_left">#04101e</color>
              <color name="accent">#1a8fff</color>
              <color name="accent2">#0055bb</color>
              <color name="gold">#ffd700</color>
              <color name="neon">#40d0ff</color>
              <color name="recent_color">#ff7a45</color>
              <color name="text_white">#ffffff</color>
              <color name="text_mid">#a0bce0</color>
              <color name="text_dim">#4a6a90</color>
              <color name="selected_bg">#0d2040</color>
              <color name="divider">#06111f</color>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">@drawable/bg_gradient</item>
                  <item name="android:windowAnimationStyle">@style/WindowAnim</item>
              </style>
              <style name="WindowAnim" parent="android:Animation.Activity">
                  <item name="android:activityOpenEnterAnimation">@anim/slide_in_right</item>
                  <item name="android:activityOpenExitAnimation">@anim/slide_out_left</item>
                  <item name="android:activityCloseEnterAnimation">@anim/slide_in_left</item>
                  <item name="android:activityCloseExitAnimation">@anim/slide_out_right</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Khalo Ahmed</string></resources>
          EOF

          for f in slide_in_right slide_out_left slide_in_left slide_out_right; do
          case $f in
          slide_in_right)  from="100%"; to="0%"   ;;
          slide_out_left)  from="0%";   to="-100%" ;;
          slide_in_left)   from="-100%"; to="0%"  ;;
          slide_out_right) from="0%";   to="100%"  ;;
          esac
          cat > app/src/main/res/anim/${f}.xml << AEOF
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="${from}" android:toXDelta="${to}"
              android:duration="260" android:interpolator="@android:anim/decelerate_interpolator"/>
          AEOF
          done

          cat > app/src/main/res/anim/fade_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <alpha xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromAlpha="0.0" android:toAlpha="1.0"
              android:duration="200" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/pop_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:fromXScale="0.88" android:toXScale="1.0"
                  android:fromYScale="0.88" android:toYScale="1.0"
                  android:pivotX="50%" android:pivotY="50%"
                  android:duration="190" android:interpolator="@android:anim/overshoot_interpolator"/>
              <alpha android:fromAlpha="0.0" android:toAlpha="1.0" android:duration="170"/>
          </set>
          EOF

          cat > app/src/main/res/layout/activity_platform.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@drawable/bg_gradient">

              <LinearLayout android:id="@+id/headerLayout"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:layout_alignParentTop="true" android:orientation="vertical"
                  android:gravity="center" android:background="@drawable/bg_header"
                  android:paddingTop="22dp" android:paddingBottom="14dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="KHALO AHMED" android:textColor="@color/neon"
                      android:textSize="28sp" android:textStyle="bold"
                      android:letterSpacing="0.30" android:fontFamily="sans-serif-condensed"/>
                  <View android:layout_width="100dp" android:layout_height="2dp"
                      android:layout_marginTop="7dp" android:background="@color/accent"/>
              </LinearLayout>

              <LinearLayout android:id="@+id/platformRow"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_centerInParent="true"
                  android:orientation="horizontal" android:gravity="center"/>

              <LinearLayout android:id="@+id/recentStrip"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:layout_above="@+id/hintText" android:orientation="vertical"
                  android:paddingStart="32dp" android:paddingEnd="32dp"
                  android:paddingBottom="6dp" android:visibility="gone">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="horizontal" android:gravity="center_vertical"
                      android:paddingBottom="7dp">
                      <TextView android:layout_width="0dp" android:layout_height="wrap_content"
                          android:layout_weight="1" android:text="RECENTLY PLAYED"
                          android:textColor="@color/recent_color" android:textSize="10sp"
                          android:textStyle="bold" android:letterSpacing="0.2" android:fontFamily="monospace"/>
                      <TextView android:id="@+id/clearRecentBtn"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="CLEAR" android:textColor="@color/text_dim"
                          android:textSize="9sp" android:fontFamily="monospace" android:padding="4dp"/>
                  </LinearLayout>
                  <LinearLayout android:id="@+id/recentGamesList"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="horizontal" android:gravity="center_vertical"/>
              </LinearLayout>

              <TextView android:id="@+id/hintText"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_alignParentBottom="true" android:layout_centerHorizontal="true"
                  android:layout_marginBottom="12dp"
                  android:text="   تنقل      OK  دخول      R1+R2  خروج"
                  android:textColor="@color/text_dim" android:textSize="11sp"
                  android:fontFamily="sans-serif-light"/>
          </RelativeLayout>
          EOF

          cat > app/src/main/res/layout/activity_games.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@drawable/bg_gradient" android:orientation="horizontal">

              <LinearLayout android:layout_width="0dp" android:layout_height="match_parent"
                  android:layout_weight="38" android:background="@drawable/bg_left_panel"
                  android:orientation="vertical">

                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="vertical" android:paddingStart="18dp" android:paddingEnd="18dp"
                      android:paddingTop="14dp" android:paddingBottom="10dp"
                      android:background="@drawable/bg_header">
                      <TextView android:id="@+id/platformName"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:textColor="@color/neon" android:textSize="14sp"
                          android:textStyle="bold" android:letterSpacing="0.18" android:fontFamily="monospace"/>
                      <TextView android:id="@+id/gameCount"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:textColor="@color/text_mid" android:textSize="11sp"
                          android:layout_marginTop="2dp" android:fontFamily="monospace"/>
                  </LinearLayout>

                  <View android:layout_width="match_parent" android:layout_height="1dp"
                      android:background="@color/accent"/>

                  <RelativeLayout android:layout_width="match_parent" android:layout_height="0dp"
                      android:layout_weight="1">
                      <ListView android:id="@+id/gameList"
                          android:layout_width="match_parent" android:layout_height="match_parent"
                          android:divider="@color/divider" android:dividerHeight="1dp"
                          android:scrollbars="none" android:focusable="false" android:overScrollMode="never"/>
                      <TextView android:id="@+id/fixedArrow"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:layout_alignParentEnd="true" android:layout_centerVertical="true"
                          android:text="&#9664;" android:textColor="@color/accent"
                          android:textSize="14sp" android:paddingEnd="8dp"/>
                  </RelativeLayout>
              </LinearLayout>

              <FrameLayout android:layout_width="0dp" android:layout_height="match_parent"
                  android:layout_weight="62" android:background="#000000">
                  <ImageView android:id="@+id/previewBg"
                      android:layout_width="match_parent" android:layout_height="match_parent"
                      android:scaleType="centerCrop" android:alpha="0.22"/>
                  <ImageView android:id="@+id/previewImg"
                      android:layout_width="wrap_content" android:layout_height="match_parent"
                      android:layout_gravity="center" android:scaleType="fitCenter"
                      android:adjustViewBounds="true" android:padding="26dp"/>
                  <TextView android:id="@+id/noArtIcon"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_gravity="center" android:textSize="88sp" android:visibility="gone"/>
                  <TextView android:id="@+id/lastPlayedBadge"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_gravity="top|end" android:layout_margin="12dp"
                      android:paddingStart="10dp" android:paddingEnd="10dp"
                      android:paddingTop="4dp" android:paddingBottom="4dp"
                      android:text="LAST PLAYED" android:textColor="#ffffff"
                      android:textSize="9sp" android:textStyle="bold" android:fontFamily="monospace"
                      android:background="#ccff7a45" android:visibility="gone"/>
                  <TextView android:id="@+id/previewTitle"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:layout_gravity="bottom" android:paddingStart="20dp" android:paddingEnd="20dp"
                      android:paddingTop="26dp" android:paddingBottom="16dp"
                      android:textColor="#ffffff" android:textSize="18sp" android:textStyle="bold"
                      android:gravity="center" android:background="#dd000a1a"
                      android:fontFamily="sans-serif-condensed" android:letterSpacing="0.04"/>
              </FrameLayout>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_recent.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@drawable/bg_gradient" android:orientation="horizontal">

              <LinearLayout android:layout_width="0dp" android:layout_height="match_parent"
                  android:layout_weight="38" android:background="@drawable/bg_left_panel"
                  android:orientation="vertical">

                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="vertical" android:paddingStart="18dp" android:paddingEnd="18dp"
                      android:paddingTop="14dp" android:paddingBottom="10dp"
                      android:background="@drawable/bg_header">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="RECENTLY PLAYED" android:textColor="@color/recent_color"
                          android:textSize="13sp" android:textStyle="bold"
                          android:letterSpacing="0.18" android:fontFamily="monospace"/>
                      <TextView android:id="@+id/recentCount"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:textColor="@color/text_mid" android:textSize="11sp"
                          android:layout_marginTop="2dp" android:fontFamily="monospace"/>
                  </LinearLayout>

                  <View android:layout_width="match_parent" android:layout_height="1dp"
                      android:background="@color/recent_color"/>

                  <RelativeLayout android:layout_width="match_parent" android:layout_height="0dp"
                      android:layout_weight="1">
                      <ListView android:id="@+id/recentList"
                          android:layout_width="match_parent" android:layout_height="match_parent"
                          android:divider="@color/divider" android:dividerHeight="1dp"
