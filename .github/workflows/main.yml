name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets/launcher

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21; targetSdk 34
                  versionCode 1; versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false; signingConfig signingConfigs.debug }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KhaloAhmed" parent="android:Theme.NoTitleBar.Fullscreen"/>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>
              <application android:allowBackup="true" android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/Theme.KhaloAhmed">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/MainActivity.java << 'EOF'
          package com.khaloahmed.launcher;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.*;
          import android.webkit.*;
          import org.json.*;
          import java.io.*;
          import java.util.*;

          public class MainActivity extends Activity {
              private WebView webView;
              private long lastInput = 0;
              private static final long INPUT_DELAY = 250;
              private boolean startPressed = false;
              private boolean selectPressed = false;

              private static final Map<String,String[]> P = new LinkedHashMap<String,String[]>(){{
                  put("PS1", new String[]{"/storage/0CF6-106E/ps1","com.epsxe.ePSXe",".bin,.iso,.img,.pbp,.cue"});
                  put("PSP", new String[]{"/storage/0CF6-106E/psp","org.ppsspp.ppsspp",".iso,.cso,.pbp"});
                  put("GBC", new String[]{"/storage/0CF6-106E/gbc","com.fastemulator.gbcfree",".gbc,.gb,.zip"});
              }};
              private static final Set<String> IMG = new HashSet<>(Arrays.asList(".png",".jpg",".jpeg",".webp"));

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setDomStorageEnabled(true);
                  webView.addJavascriptInterface(new Bridge(), "Android");
                  webView.loadUrl("file:///android_asset/launcher/index.html");
              }

              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                      && event.getAction() == MotionEvent.ACTION_MOVE) {
                      long now = System.currentTimeMillis();
                      if (now - lastInput < INPUT_DELAY) return true;
                      float x = event.getAxisValue(MotionEvent.AXIS_X);
                      float y = event.getAxisValue(MotionEvent.AXIS_Y);
                      float hatX = event.getAxisValue(MotionEvent.AXIS_HAT_X);
                      float hatY = event.getAxisValue(MotionEvent.AXIS_HAT_Y);
                      if      (x < -0.5f || hatX < -0.5f) { lastInput=now; sendKey("ArrowLeft"); }
                      else if (x >  0.5f || hatX >  0.5f) { lastInput=now; sendKey("ArrowRight"); }
                      else if (y < -0.5f || hatY < -0.5f) { lastInput=now; sendKey("ArrowUp"); }
                      else if (y >  0.5f || hatY >  0.5f) { lastInput=now; sendKey("ArrowDown"); }
                      return true;
                  }
                  return super.onGenericMotionEvent(event);
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed  = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;
                  if (startPressed && selectPressed) { finish(); return true; }

                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_UP:             sendKey("ArrowUp");    return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:           sendKey("ArrowDown");  return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:           sendKey("ArrowLeft");  return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:          sendKey("ArrowRight"); return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:         sendKey("Enter");      return true;
                      case KeyEvent.KEYCODE_BUTTON_B:
                      case KeyEvent.KEYCODE_BACK:                sendKey("Escape");     return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed  = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;
                  return super.onKeyUp(keyCode, event);
              }

              private void sendKey(final String key) {
                  runOnUiThread(new Runnable() {
                      @Override public void run() {
                          webView.evaluateJavascript("handleKey('" + key + "')", null);
                      }
                  });
              }

              class Bridge {
                  @JavascriptInterface
                  public String getGamesList() {
                      JSONArray games = new JSONArray();
                      try {
                          for (Map.Entry<String,String[]> e : P.entrySet()) {
                              String pl=e.getKey(), pa=e.getValue()[0], exStr=e.getValue()[2];
                              Set<String> exts = new HashSet<>(Arrays.asList(exStr.split(",")));
                              File dir = new File(pa);
                              if (!dir.exists()) continue;
                              File[] files = dir.listFiles();
                              if (files == null) continue;
                              Map<String,String> arts = new HashMap<>();
                              for (File f : files) {
                                  String n = f.getName().toLowerCase();
                                  for (String ie : IMG) {
                                      if (n.endsWith(ie)) arts.put(n.substring(0,n.lastIndexOf('.')), f.getAbsolutePath());
                                  }
                              }
                              for (File f : files) {
                                  if (!f.isFile()) continue;
                                  String nm=f.getName(), nl=nm.toLowerCase();
                                  boolean rom=false;
                                  for (String x : exts) { if (nl.endsWith(x.trim())) { rom=true; break; } }
                                  if (!rom) continue;
                                  String base = nm.contains(".") ? nm.substring(0,nm.lastIndexOf('.')) : nm;
                                  JSONObject o = new JSONObject();
                                  o.put("name", base.replaceAll("[_\\-]"," ").trim());
                                  o.put("platform", pl);
                                  o.put("file", nm);
                                  o.put("path", f.getAbsolutePath());
                                  o.put("art", arts.containsKey(base.toLowerCase()) ? arts.get(base.toLowerCase()) : "");
                                  games.put(o);
                              }
                          }
                      } catch (Exception e) { e.printStackTrace(); }
                      return games.toString();
                  }

                  @JavascriptInterface
                  public void launchGame(String pkg, String rom) {
                      try {
                          Intent i = getPackageManager().getLaunchIntentForPackage(pkg);
                          if (i == null) return;
                          i.setData(Uri.fromFile(new File(rom)));
                          i.putExtra("romPath", rom);
                          i.putExtra("com.epsxe.ePSXe.ROM", rom);
                          i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(i);
                      } catch (Exception e) { e.printStackTrace(); }
                  }
              }

              @Override
              public void onBackPressed() {
                  webView.evaluateJavascript("handleKey('Escape')", null);
              }
          }
          EOF

      - name: Create HTML Launcher
        run: |
          cat > app/src/main/assets/launcher/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ar"><head>
          <meta charset="UTF-8">
          <title>Khalo Ahmed</title>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700&display=swap');
            :root {
              --bg: #0d0d0d;
              --left-bg: #111111;
              --gold: #f0c040;
              --gold2: #ffaa00;
              --text: #ffffff;
              --dim: #555555;
              --highlight: #1a1a1a;
            }
            * { margin:0; padding:0; box-sizing:border-box; }
            body { background:var(--bg); color:var(--text); font-family:'Cairo',sans-serif; height:100vh; overflow:hidden; }

            /* ===== PLATFORM SCREEN ===== */
            #platformScreen {
              position:fixed; inset:0;
              display:flex; flex-direction:column;
              align-items:center; justify-content:center;
              background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d0d 70%);
            }
            .app-title {
              font-family:'Orbitron',monospace;
              font-size:2.2rem; font-weight:900;
              letter-spacing:8px;
              background:linear-gradient(135deg,#6488ff,#a070ff,var(--gold));
              -webkit-background-clip:text; -webkit-text-fill-color:transparent;
              margin-bottom:60px;
            }
            .platforms-row {
              display:flex; gap:60px; align-items:center; justify-content:center;
            }
            .platform-item {
              display:flex; flex-direction:column; align-items:center; gap:16px;
              cursor:pointer; transition:all 0.2s;
              opacity:0.4;
            }
            .platform-item.active { opacity:1; }
            .platform-icon {
              width:120px; height:120px;
              border-radius:20px;
              display:flex; align-items:center; justify-content:center;
              font-size:3rem;
              border:3px solid transparent;
              background:#1a1a1a;
              transition:all 0.2s;
            }
            .platform-item.active .platform-icon {
              border-color:var(--gold);
              box-shadow:0 0 40px rgba(240,192,64,0.4);
              background:#222;
              transform:scale(1.1);
            }
            .platform-name {
              font-family:'Orbitron',monospace;
              font-size:1rem; font-weight:700;
              letter-spacing:3px;
              color:var(--dim);
            }
            .platform-item.active .platform-name { color:var(--gold); }
            .platform-count {
              font-size:0.7rem; color:var(--dim);
              font-family:'Orbitron',monospace;
            }
            .platform-item.active .platform-count { color:#aaa; }
            .hint-bottom {
              position:fixed; bottom:20px;
              font-family:'Orbitron',monospace;
              font-size:0.65rem; letter-spacing:2px; color:var(--dim);
            }

            /* ===== GAMES SCREEN ===== */
            #gamesScreen {
              position:fixed; inset:0;
              display:none;
              flex-direction:row;
            }

            /* Left: game list */
            .games-list {
              width:45%;
              background:var(--left-bg);
              display:flex; flex-direction:column;
              padding:0;
              overflow:hidden;
              position:relative;
            }
            .games-list-header {
              padding:30px 40px 20px;
              border-bottom:1px solid #222;
              flex-shrink:0;
            }
            .games-list-platform {
              font-family:'Orbitron',monospace;
              font-size:0.65rem; letter-spacing:4px;
              color:var(--gold); margin-bottom:6px;
            }
            .games-list-count {
              font-size:0.75rem; color:var(--dim);
              font-family:'Orbitron',monospace;
            }
            .games-list-items {
              flex:1; overflow:hidden;
              padding:10px 0;
              position:relative;
            }
            .game-item {
              padding:14px 40px;
              cursor:pointer;
              transition:all 0.15s;
              border-left:4px solid transparent;
              display:flex; align-items:center; gap:16px;
            }
            .game-item.focused {
              background:var(--highlight);
              border-left-color:var(--gold);
            }
            .game-item-num {
              font-family:'Orbitron',monospace;
              font-size:0.6rem; color:var(--dim);
              width:24px; flex-shrink:0;
            }
            .game-item.focused .game-item-num { color:var(--gold); }
            .game-item-name {
              font-size:1.1rem; font-weight:700;
              color:#aaa;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            }
            .game-item.focused .game-item-name {
              color:var(--text);
              font-size:1.25rem;
            }

            /* Right: game art */
            .game-preview {
              flex:1;
              position:relative;
              overflow:hidden;
              background:#000;
              display:flex; align-items:center; justify-content:center;
            }
            .preview-bg {
              position:absolute; inset:0;
              background-size:cover; background-position:center;
              filter:blur(30px) brightness(0.3);
              transition:background-image 0.3s;
            }
            .preview-img {
              position:relative; z-index:2;
              max-width:70%; max-height:75%;
              border-radius:12px;
              box-shadow:0 20px 60px rgba(0,0,0,0.8);
              border:2px solid rgba(255,255,255,0.1);
              object-fit:cover;
              transition:opacity 0.3s;
            }
            .preview-no-art {
              position:relative; z-index:2;
              display:flex; flex-direction:column; align-items:center; gap:16px;
              color:var(--dim);
            }
            .preview-no-art .icon { font-size:5rem; }
            .preview-no-art .name {
              font-family:'Orbitron',monospace;
              font-size:0.7rem; letter-spacing:3px;
            }
            .preview-title {
              position:absolute; bottom:30px; left:0; right:0; z-index:3;
              text-align:center;
              font-size:1.1rem; font-weight:700;
              color:rgba(255,255,255,0.9);
              text-shadow:0 2px 10px rgba(0,0,0,0.8);
              padding:0 20px;
            }

            /* hints */
            .hints {
              position:fixed; bottom:0; left:0; right:0;
              padding:10px 30px;
              display:flex; gap:24px;
              font-family:'Orbitron',monospace;
              font-size:0.6rem; letter-spacing:1px;
              color:var(--dim);
              background:linear-gradient(0deg,rgba(0,0,0,0.8),transparent);
              z-index:100;
            }
            .hk { background:#222; border:1px solid #333; padding:2px 8px; border-radius:4px; margin-left:4px; }
          </style>
          </head><body>

          <!-- SCREEN 1: Platform Selection -->
          <div id="platformScreen">
            <div class="app-title">KHALO AHMED</div>
            <div class="platforms-row" id="platformsRow"></div>
            <div class="hint-bottom">X للدخول &nbsp;•&nbsp; START+SELECT للخروج</div>
          </div>

          <!-- SCREEN 2: Games List -->
          <div id="gamesScreen">
            <div class="games-list">
              <div class="games-list-header">
                <div class="games-list-platform" id="listPlatform">PS1</div>
                <div class="games-list-count" id="listCount">0 GAMES</div>
              </div>
              <div class="games-list-items" id="gameItems"></div>
            </div>
            <div class="game-preview" id="gamePreview">
              <div class="preview-bg" id="previewBg"></div>
              <img class="preview-img" id="previewImg" src="" alt="" style="display:none">
              <div class="preview-no-art" id="previewNoArt">
                <div class="icon">🎮</div>
                <div class="name">SELECT A GAME</div>
              </div>
              <div class="preview-title" id="previewTitle"></div>
            </div>
          </div>

          <div class="hints" id="hints">
            <span><span class="hk">◀▶</span> تنقل</span>
            <span><span class="hk">X</span> دخول</span>
            <span><span class="hk">○</span> رجوع</span>
            <span><span class="hk">START+SELECT</span> خروج</span>
          </div>

          <script>
          const PLATFORMS = {
            PS1: { name:'PS1', icon:'🎮', path:'/storage/0CF6-106E/ps1', emu:'com.epsxe.ePSXe' },
            PSP: { name:'PSP', icon:'🕹️', path:'/storage/0CF6-106E/psp', emu:'org.ppsspp.ppsspp' },
            GBC: { name:'GBC', icon:'👾', path:'/storage/0CF6-106E/gbc', emu:'com.fastemulator.gbcfree' }
          };

          const DEMO = {
            PS1:[{name:'Final Fantasy VII',file:'ff7.bin',art:''},{name:'Crash Bandicoot',file:'crash.bin',art:''},{name:'Tekken 3',file:'tekken3.bin',art:''}],
            PSP:[{name:'God of War',file:'gow.iso',art:''},{name:'Monster Hunter',file:'mhf.iso',art:''}],
            GBC:[{name:'Pokemon Red',file:'pokered.gbc',art:''},{name:'Pokemon Crystal',file:'crystal.gbc',art:''}]
          };

          let allGames = {};
          let screen = 'platform'; // 'platform' | 'games'
          let platformIdx = 0;
          let gameIdx = 0;
          const platformKeys = Object.keys(PLATFORMS);

          // ===== INIT =====
          function init() {
            loadGames();
            renderPlatforms();
          }

          function loadGames() {
            try {
              if (window.Android && window.Android.getGamesList) {
                const raw = JSON.parse(window.Android.getGamesList());
                platformKeys.forEach(k => allGames[k] = []);
                raw.forEach(g => { if (allGames[g.platform]) allGames[g.platform].push(g); });
                // fallback if empty
                platformKeys.forEach(k => { if (!allGames[k].length) allGames[k] = DEMO[k] || []; });
              } else {
                allGames = JSON.parse(JSON.stringify(DEMO));
              }
            } catch(e) { allGames = JSON.parse(JSON.stringify(DEMO)); }
          }

          // ===== PLATFORM SCREEN =====
          function renderPlatforms() {
            const row = document.getElementById('platformsRow');
            row.innerHTML = platformKeys.map((k, i) => {
              const p = PLATFORMS[k];
              const count = (allGames[k] || []).length;
              return `<div class="platform-item ${i===platformIdx?'active':''}" onclick="selectPlatform(${i})">
                <div class="platform-icon">${p.icon}</div>
                <div class="platform-name">${p.name}</div>
                <div class="platform-count">${count} GAMES</div>
              </div>`;
            }).join('');
          }

          function selectPlatform(idx) {
            platformIdx = idx;
            const key = platformKeys[platformIdx];
            gameIdx = 0;
            screen = 'games';
            document.getElementById('platformScreen').style.display = 'none';
            document.getElementById('gamesScreen').style.display = 'flex';
            document.getElementById('listPlatform').textContent = key;
            renderGamesList();
          }

          // ===== GAMES SCREEN =====
          function renderGamesList() {
            const key = platformKeys[platformIdx];
            const games = allGames[key] || [];
            document.getElementById('listCount').textContent = games.length + ' GAMES';

            const container = document.getElementById('gameItems');
            container.innerHTML = games.map((g, i) =>
              `<div class="game-item ${i===gameIdx?'focused':''}" onclick="gameIdx=${i};renderGamesList()">
                <div class="game-item-num">${String(i+1).padStart(2,'0')}</div>
                <div class="game-item-name">${g.name}</div>
              </div>`
            ).join('');

            // scroll focused into view
            const focused = container.querySelector('.game-item.focused');
            if (focused) focused.scrollIntoView({ block:'nearest', behavior:'smooth' });

            updatePreview();
          }

          function updatePreview() {
            const key = platformKeys[platformIdx];
            const games = allGames[key] || [];
            const game = games[gameIdx];
            if (!game) return;

            const img = document.getElementById('previewImg');
            const noArt = document.getElementById('previewNoArt');
            const bg = document.getElementById('previewBg');
            const title = document.getElementById('previewTitle');

            title.textContent = game.name;

            if (game.art) {
              const src = 'file://' + game.art;
              img.onload = function() { img.style.display='block'; noArt.style.display='none'; };
              img.onerror = function() { img.style.display='none'; noArt.style.display='flex'; };
              img.src = src;
              bg.style.backgroundImage = 'url(' + src + ')';
            } else {
              img.style.display = 'none';
              noArt.style.display = 'flex';
              bg.style.backgroundImage = 'none';
              const p = PLATFORMS[key];
              noArt.innerHTML = '<div class="icon">'+p.icon+'</div><div class="name">NO ART</div>';
            }
          }

          function launchCurrentGame() {
            const key = platformKeys[platformIdx];
            const games = allGames[key] || [];
            const game = games[gameIdx];
            if (!game || !game.file) return;
            const p = PLATFORMS[key];
            if (window.Android) window.Android.launchGame(p.emu, p.path + '/' + game.file);
          }

          // ===== KEY HANDLER (called from Java) =====
          function handleKey(key) {
            if (screen === 'platform') {
              if (key === 'ArrowLeft')  { platformIdx = Math.max(0, platformIdx-1); renderPlatforms(); }
              if (key === 'ArrowRight') { platformIdx = Math.min(platformKeys.length-1, platformIdx+1); renderPlatforms(); }
              if (key === 'Enter')      { selectPlatform(platformIdx); }
            } else if (screen === 'games') {
              const key2 = platformKeys[platformIdx];
              const count = (allGames[key2] || []).length;
              if (key === 'ArrowUp')   { gameIdx = Math.max(0, gameIdx-1); renderGamesList(); }
              if (key === 'ArrowDown') { gameIdx = Math.min(count-1, gameIdx+1); renderGamesList(); }
              if (key === 'Enter')     { launchCurrentGame(); }
              if (key === 'Escape')    { screen='platform'; document.getElementById('gamesScreen').style.display='none'; document.getElementById('platformScreen').style.display='flex'; renderPlatforms(); }
            }
          }

          init();
          </script>
          </body></html>
          HTMLEOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
