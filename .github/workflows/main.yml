name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create full Native project
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          EOF

          # root build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # app build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21; targetSdk 34
                  versionCode 1; versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false; signingConfig signingConfigs.debug }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # AndroidManifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>
              <application
                  android:allowBackup="true"
                  android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/AppTheme">
                  <activity android:name=".PlatformActivity" android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".GamesActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape"/>
              </application>
          </manifest>
          EOF

          # colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0a0a14</color>
              <color name="bg_card">#12122a</color>
              <color name="bg_left">#0d0d1f</color>
              <color name="accent">#7c5cbf</color>
              <color name="accent2">#4466ff</color>
              <color name="gold">#f0c040</color>
              <color name="text_white">#ffffff</color>
              <color name="text_dim">#556080</color>
              <color name="selected_bg">#1a1a35</color>
              <color name="transparent">#00000000</color>
          </resources>
          EOF

          # styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">@color/bg_dark</item>
                  <item name="android:windowAnimationStyle">@style/WindowAnim</item>
              </style>
              <style name="WindowAnim" parent="android:Animation.Activity">
                  <item name="android:activityOpenEnterAnimation">@anim/slide_in_right</item>
                  <item name="android:activityOpenExitAnimation">@anim/slide_out_left</item>
                  <item name="android:activityCloseEnterAnimation">@anim/slide_in_left</item>
                  <item name="android:activityCloseExitAnimation">@anim/slide_out_right</item>
              </style>
          </resources>
          EOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Khalo Ahmed</string>
          </resources>
          EOF

          # slide animations
          cat > app/src/main/res/anim/slide_in_right.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="100%" android:toXDelta="0%"
              android:duration="300" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/slide_out_left.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="0%" android:toXDelta="-100%"
              android:duration="300" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/slide_in_left.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="-100%" android:toXDelta="0%"
              android:duration="300" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/slide_out_right.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="0%" android:toXDelta="100%"
              android:duration="300" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/fade_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <alpha xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromAlpha="0.0" android:toAlpha="1.0"
              android:duration="250" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          # layout: activity_platform.xml
          cat > app/src/main/res/layout/activity_platform.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@color/bg_dark">

              <!-- Title -->
              <TextView android:id="@+id/title"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="40dp"
                  android:text="KHALO AHMED"
                  android:textColor="@color/accent2"
                  android:textSize="28sp"
                  android:textStyle="bold"
                  android:letterSpacing="0.2"
                  android:fontFamily="sans-serif-condensed"/>

              <!-- Platform cards row -->
              <LinearLayout android:id="@+id/platformRow"
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_centerInParent="true"
                  android:orientation="horizontal"
                  android:gravity="center"
                  android:layout_marginTop="20dp"/>

              <!-- Hint -->
              <TextView
                  android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_alignParentBottom="true"
                  android:layout_centerHorizontal="true"
                  android:layout_marginBottom="20dp"
                  android:text="◀ ▶  تنقل      OK  دخول      START+SELECT  خروج"
                  android:textColor="@color/text_dim"
                  android:textSize="11sp"/>
          </RelativeLayout>
          EOF

          # layout: activity_games.xml
          cat > app/src/main/res/layout/activity_games.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@color/bg_dark"
              android:orientation="horizontal">

              <!-- LEFT: game list -->
              <LinearLayout
                  android:layout_width="0dp" android:layout_height="match_parent"
                  android:layout_weight="4"
                  android:background="@color/bg_left"
                  android:orientation="vertical">

                  <!-- Header -->
                  <LinearLayout
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:padding="24dp"
                      android:background="@color/bg_card">
                      <TextView android:id="@+id/platformName"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:textColor="@color/accent2"
                          android:textSize="11sp"
                          android:textStyle="bold"
                          android:letterSpacing="0.2"/>
                      <TextView android:id="@+id/gameCount"
                          android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:textColor="@color/text_dim"
                          android:textSize="11sp"
                          android:layout_marginTop="4dp"/>
                  </LinearLayout>

                  <!-- Game list -->
                  <ListView android:id="@+id/gameList"
                      android:layout_width="match_parent" android:layout_height="0dp"
                      android:layout_weight="1"
                      android:divider="@color/bg_card"
                      android:dividerHeight="1dp"
                      android:scrollbars="none"
                      android:focusable="false"/>
              </LinearLayout>

              <!-- RIGHT: preview -->
              <FrameLayout
                  android:layout_width="0dp" android:layout_height="match_parent"
                  android:layout_weight="6"
                  android:background="#000000">

                  <!-- blurred background -->
                  <ImageView android:id="@+id/previewBg"
                      android:layout_width="match_parent" android:layout_height="match_parent"
                      android:scaleType="centerCrop"
                      android:alpha="0.3"/>

                  <!-- main art -->
                  <ImageView android:id="@+id/previewImg"
                      android:layout_width="wrap_content" android:layout_height="match_parent"
                      android:layout_gravity="center"
                      android:scaleType="fitCenter"
                      android:adjustViewBounds="true"
                      android:padding="30dp"/>

                  <!-- no art icon -->
                  <TextView android:id="@+id/noArtIcon"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_gravity="center"
                      android:textSize="80sp"
                      android:visibility="gone"/>

                  <!-- game title overlay -->
                  <TextView android:id="@+id/previewTitle"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:layout_gravity="bottom"
                      android:padding="20dp"
                      android:textColor="#ffffffcc"
                      android:textSize="16sp"
                      android:textStyle="bold"
                      android:gravity="center"
                      android:background="#88000000"/>
              </FrameLayout>
          </LinearLayout>
          EOF

          # layout: item_game.xml
          cat > app/src/main/res/layout/item_game.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="horizontal"
              android:padding="16dp"
              android:paddingStart="24dp"
              android:gravity="center_vertical">

              <TextView android:id="@+id/gameNum"
                  android:layout_width="32dp" android:layout_height="wrap_content"
                  android:textColor="@color/text_dim"
                  android:textSize="10sp"
                  android:fontFamily="monospace"/>

              <TextView android:id="@+id/gameName"
                  android:layout_width="0dp" android:layout_height="wrap_content"
                  android:layout_weight="1"
                  android:textColor="#aaaacc"
                  android:textSize="15sp"
                  android:ellipsize="end"
                  android:singleLine="true"/>
          </LinearLayout>
          EOF

      - name: Create Java files
        run: |
          # Config.java
          cat > app/src/main/java/com/khaloahmed/launcher/Config.java << 'EOF'
          package com.khaloahmed.launcher;
          public class Config {
              public static final String[][] PLATFORMS = {
                  {"PS1",  "/storage/0CF6-106E/ps1", "com.epsxe.ePSXe",          ".bin,.iso,.img,.pbp,.cue", "🎮"},
                  {"PSP",  "/storage/0CF6-106E/psp", "org.ppsspp.ppsspp",         ".iso,.cso,.pbp",           "🕹️"},
                  {"GBC",  "/storage/0CF6-106E/gbc", "com.fastemulator.gbcfree",  ".gbc,.gb,.zip",            "👾"},
              };
              public static final String[] IMAGE_EXTS = {".png", ".jpg", ".jpeg", ".webp"};
          }
          EOF

          # GameItem.java
          cat > app/src/main/java/com/khaloahmed/launcher/GameItem.java << 'EOF'
          package com.khaloahmed.launcher;
          public class GameItem {
              public String name, file, artPath, platform;
              public GameItem(String name, String file, String artPath, String platform) {
                  this.name=name; this.file=file; this.artPath=artPath; this.platform=platform;
              }
          }
          EOF

          # GameScanner.java
          cat > app/src/main/java/com/khaloahmed/launcher/GameScanner.java << 'EOF'
          package com.khaloahmed.launcher;
          import java.io.*;
          import java.util.*;
          public class GameScanner {
              public static List<GameItem> scan(String platformKey) {
                  List<GameItem> result = new ArrayList<>();
                  String[] cfg = null;
                  for (String[] p : Config.PLATFORMS) {
                      if (p[0].equals(platformKey)) { cfg = p; break; }
                  }
                  if (cfg == null) return result;
                  String folderPath = cfg[1];
                  String extsStr   = cfg[3];
                  Set<String> exts = new HashSet<>(Arrays.asList(extsStr.split(",")));
                  File dir = new File(folderPath);
                  if (!dir.exists() || !dir.isDirectory()) return result;
                  File[] files = dir.listFiles();
                  if (files == null) return result;
                  // build art map
                  Map<String,String> artMap = new HashMap<>();
                  for (File f : files) {
                      String n = f.getName().toLowerCase();
                      for (String ie : Config.IMAGE_EXTS) {
                          if (n.endsWith(ie)) {
                              artMap.put(n.substring(0, n.lastIndexOf('.')), f.getAbsolutePath());
                          }
                      }
                  }
                  // find roms
                  for (File f : files) {
                      if (!f.isFile()) continue;
                      String nm = f.getName(), nl = nm.toLowerCase();
                      boolean isRom = false;
                      for (String x : exts) { if (nl.endsWith(x.trim())) { isRom=true; break; } }
                      if (!isRom) continue;
                      String base = nm.contains(".") ? nm.substring(0, nm.lastIndexOf('.')) : nm;
                      String displayName = base.replaceAll("[_\\-]", " ").trim();
                      String art = artMap.containsKey(base.toLowerCase()) ? artMap.get(base.toLowerCase()) : "";
                      result.add(new GameItem(displayName, nm, art, platformKey));
                  }
                  Collections.sort(result, new Comparator<GameItem>() {
                      public int compare(GameItem a, GameItem b) { return a.name.compareToIgnoreCase(b.name); }
                  });
                  return result;
              }
          }
          EOF

          # PlatformActivity.java
          cat > app/src/main/java/com/khaloahmed/launcher/PlatformActivity.java << 'EOF'
          package com.khaloahmed.launcher;
          import android.app.Activity;
          import android.content.Intent;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          import android.view.animation.*;
          import android.widget.*;
          import java.util.List;

          public class PlatformActivity extends Activity {
              private int selectedIdx = 0;
              private boolean startPressed = false, selectPressed = false;
              private LinearLayout platformRow;
              private int[] gameCounts;

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  setContentView(R.layout.activity_platform);
                  platformRow = findViewById(R.id.platformRow);
                  // count games per platform
                  gameCounts = new int[Config.PLATFORMS.length];
                  for (int i=0;i<Config.PLATFORMS.length;i++) {
                      List<GameItem> games = GameScanner.scan(Config.PLATFORMS[i][0]);
                      gameCounts[i] = games.size();
                  }
                  drawPlatforms();
              }

              private void drawPlatforms() {
                  platformRow.removeAllViews();
                  for (int i = 0; i < Config.PLATFORMS.length; i++) {
                      String[] p = Config.PLATFORMS[i];
                      boolean sel = (i == selectedIdx);
                      // Card
                      LinearLayout card = new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);
                      card.setGravity(Gravity.CENTER);
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(220, 220);
                      lp.setMargins(30,0,30,0);
                      card.setLayoutParams(lp);
                      card.setPadding(16,16,16,16);

                      if (sel) {
                          GradientDrawable gd = new GradientDrawable();
                          gd.setCornerRadius(28f);
                          gd.setColor(0xff1a1a35);
                          gd.setStroke(4, 0xff7c5cbf);
                          card.setBackground(gd);
                          // glow effect via elevation
                          card.setElevation(24f);
                          // scale animation
                          ScaleAnimation scale = new ScaleAnimation(0.95f,1.08f,0.95f,1.08f,
                              Animation.RELATIVE_TO_SELF,0.5f,Animation.RELATIVE_TO_SELF,0.5f);
                          scale.setDuration(150); scale.setFillAfter(true);
                          card.startAnimation(scale);
                      } else {
                          GradientDrawable gd = new GradientDrawable();
                          gd.setCornerRadius(28f);
                          gd.setColor(0xff12122a);
                          card.setBackground(gd);
                          card.setElevation(4f);
                          card.setAlpha(0.45f);
                      }

                      // Icon
                      TextView icon = new TextView(this);
                      icon.setText(p[4]);
                      icon.setTextSize(sel ? 42 : 36);
                      icon.setGravity(Gravity.CENTER);
                      card.addView(icon);

                      // Name
                      TextView name = new TextView(this);
                      name.setText(p[0]);
                      name.setTextSize(sel ? 16 : 13);
                      name.setTextColor(sel ? 0xfff0c040 : 0xff556080);
                      name.setGravity(Gravity.CENTER);
                      name.setTypeface(Typeface.MONOSPACE, Typeface.BOLD);
                      name.setLetterSpacing(0.15f);
                      name.setPadding(0,8,0,0);
                      card.addView(name);

                      // Count
                      TextView count = new TextView(this);
                      count.setText(gameCounts[i] + " GAMES");
                      count.setTextSize(10);
                      count.setTextColor(sel ? 0xffaaaacc : 0xff334060);
                      count.setGravity(Gravity.CENTER);
                      count.setTypeface(Typeface.MONOSPACE);
                      count.setPadding(0,4,0,0);
                      card.addView(count);

                      final int idx = i;
                      card.setOnClickListener(v -> openPlatform(idx));
                      platformRow.addView(card);
                  }
              }

              private void openPlatform(int idx) {
                  selectedIdx = idx;
                  Intent intent = new Intent(this, GamesActivity.class);
                  intent.putExtra("platformIdx", idx);
                  startActivity(intent);
                  overridePendingTransition(R.anim.slide_in_right, R.anim.slide_out_left);
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed  = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;
                  if (startPressed && selectPressed) { finish(); return true; }
                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_LEFT:
                          if (selectedIdx > 0) { selectedIdx--; drawPlatforms(); } return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:
                          if (selectedIdx < Config.PLATFORMS.length-1) { selectedIdx++; drawPlatforms(); } return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          openPlatform(selectedIdx); return true;
                      case KeyEvent.KEYCODE_BACK:
                      case KeyEvent.KEYCODE_BUTTON_B:
                          finish(); return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed  = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;
                  return super.onKeyUp(keyCode, event);
              }

              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                      && event.getAction() == MotionEvent.ACTION_MOVE) {
                      float x = event.getAxisValue(MotionEvent.AXIS_X);
                      float hatX = event.getAxisValue(MotionEvent.AXIS_HAT_X);
                      if (x < -0.5f || hatX < -0.5f) {
                          if (selectedIdx > 0) { selectedIdx--; drawPlatforms(); }
                      } else if (x > 0.5f || hatX > 0.5f) {
                          if (selectedIdx < Config.PLATFORMS.length-1) { selectedIdx++; drawPlatforms(); }
                      }
                      return true;
                  }
                  return super.onGenericMotionEvent(event);
              }
          }
          EOF

          # GamesActivity.java
          cat > app/src/main/java/com/khaloahmed/launcher/GamesActivity.java << 'EOF'
          package com.khaloahmed.launcher;
          import android.app.Activity;
          import android.content.Intent;
          import android.graphics.*;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.*;
          import android.view.animation.*;
          import android.widget.*;
          import java.io.File;
          import java.util.*;

          public class GamesActivity extends Activity {
              private int platformIdx;
              private List<GameItem> games;
              private int selectedGame = 0;
              private boolean startPressed=false, selectPressed=false;
              private ListView listView;
              private ImageView previewImg, previewBg;
              private TextView noArtIcon, previewTitle, platformName, gameCount;
              private Handler handler = new Handler();
              private Runnable previewRunnable;
              private long lastInput = 0;
              private static final long INPUT_DELAY = 180;

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  setContentView(R.layout.activity_games);

                  platformIdx = getIntent().getIntExtra("platformIdx", 0);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  games = GameScanner.scan(cfg[0]);

                  listView    = findViewById(R.id.gameList);
                  previewImg  = findViewById(R.id.previewImg);
                  previewBg   = findViewById(R.id.previewBg);
                  noArtIcon   = findViewById(R.id.noArtIcon);
                  previewTitle= findViewById(R.id.previewTitle);
                  platformName= findViewById(R.id.platformName);
                  gameCount   = findViewById(R.id.gameCount);

                  platformName.setText(cfg[0]);
                  gameCount.setText(games.size() + " GAMES");

                  setupList();
                  updatePreview(true);
              }

              private void setupList() {
                  GameAdapter adapter = new GameAdapter();
                  listView.setAdapter(adapter);
                  listView.setOnItemClickListener((p, v, pos, id) -> {
                      selectedGame = pos;
                      adapter.notifyDataSetChanged();
                      updatePreview(true);
                  });
              }

              private void updatePreview(boolean animate) {
                  if (games.isEmpty()) return;
                  GameItem g = games.get(selectedGame);
                  previewTitle.setText(g.name);

                  if (!g.artPath.isEmpty()) {
                      File f = new File(g.artPath);
                      if (f.exists()) {
                          Bitmap bmp = BitmapFactory.decodeFile(g.artPath);
                          if (bmp != null) {
                              previewImg.setImageBitmap(bmp);
                              previewBg.setImageBitmap(bmp);
                              previewImg.setVisibility(View.VISIBLE);
                              previewBg.setVisibility(View.VISIBLE);
                              noArtIcon.setVisibility(View.GONE);
                              if (animate) {
                                  Animation fadeIn = AnimationUtils.loadAnimation(this, R.anim.fade_in);
                                  previewImg.startAnimation(fadeIn);
                              }
                              return;
                          }
                      }
                  }
                  // No art
                  previewImg.setVisibility(View.GONE);
                  previewBg.setVisibility(View.GONE);
                  noArtIcon.setVisibility(View.VISIBLE);
                  noArtIcon.setText(Config.PLATFORMS[platformIdx][4]);
              }

              private void launchGame() {
                  if (games.isEmpty()) return;
                  GameItem g = games.get(selectedGame);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  String romPath = cfg[1] + "/" + g.file;
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage(cfg[2]);
                      if (i == null) { toast("المحاكي مش موجود!"); return; }
                      i.setData(Uri.fromFile(new File(romPath)));
                      i.putExtra("romPath", romPath);
                      i.putExtra("com.epsxe.ePSXe.ROM", romPath);
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(i);
                  } catch (Exception e) { toast("خطأ في التشغيل"); }
              }

              private void toast(String msg) {
                  Toast.makeText(this, msg, Toast.LENGTH_SHORT).show();
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed  = true;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = true;
                  if (startPressed && selectPressed) { finish(); finishAffinity(); return true; }

                  long now = System.currentTimeMillis();
                  if (now - lastInput < INPUT_DELAY) return true;

                  switch (keyCode) {
                      case KeyEvent.KEYCODE_DPAD_UP:
                          if (selectedGame > 0) {
                              lastInput=now; selectedGame--;
                              ((GameAdapter)listView.getAdapter()).notifyDataSetChanged();
                              listView.smoothScrollToPosition(selectedGame);
                              schedulePreview();
                          } return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:
                          if (selectedGame < games.size()-1) {
                              lastInput=now; selectedGame++;
                              ((GameAdapter)listView.getAdapter()).notifyDataSetChanged();
                              listView.smoothScrollToPosition(selectedGame);
                              schedulePreview();
                          } return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          lastInput=now; launchGame(); return true;
                      case KeyEvent.KEYCODE_BUTTON_B:
                      case KeyEvent.KEYCODE_BACK:
                          finish();
                          overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
                          return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              public boolean onKeyUp(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_START)  startPressed  = false;
                  if (keyCode == KeyEvent.KEYCODE_BUTTON_SELECT) selectPressed = false;
                  return super.onKeyUp(keyCode, event);
              }

              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                      && event.getAction() == MotionEvent.ACTION_MOVE) {
                      long now = System.currentTimeMillis();
                      if (now - lastInput < INPUT_DELAY) return true;
                      float y = event.getAxisValue(MotionEvent.AXIS_Y);
                      float hatY = event.getAxisValue(MotionEvent.AXIS_HAT_Y);
                      if (y < -0.5f || hatY < -0.5f) {
                          if (selectedGame > 0) { lastInput=now; selectedGame--; refreshList(); schedulePreview(); }
                      } else if (y > 0.5f || hatY > 0.5f) {
                          if (selectedGame < games.size()-1) { lastInput=now; selectedGame++; refreshList(); schedulePreview(); }
                      }
                      return true;
                  }
                  return super.onGenericMotionEvent(event);
              }

              private void refreshList() {
                  ((GameAdapter)listView.getAdapter()).notifyDataSetChanged();
                  listView.smoothScrollToPosition(selectedGame);
              }

              // Delay preview update while scrolling fast
              private void schedulePreview() {
                  if (previewRunnable != null) handler.removeCallbacks(previewRunnable);
                  previewRunnable = () -> updatePreview(true);
                  handler.postDelayed(previewRunnable, 120);
              }

              @Override
              public void onBackPressed() {
                  finish();
                  overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
              }

              class GameAdapter extends BaseAdapter {
                  @Override public int getCount() { return games.size(); }
                  @Override public Object getItem(int p) { return games.get(p); }
                  @Override public long getItemId(int p) { return p; }
                  @Override public View getView(int pos, View cv, ViewGroup parent) {
                      if (cv == null) cv = getLayoutInflater().inflate(R.layout.item_game, parent, false);
                      GameItem g = games.get(pos);
                      TextView num  = cv.findViewById(R.id.gameNum);
                      TextView name = cv.findViewById(R.id.gameName);
                      num.setText(String.format("%02d", pos+1));
                      name.setText(g.name);
                      boolean sel = (pos == selectedGame);
                      if (sel) {
                          cv.setBackgroundColor(0xff1a1a35);
                          name.setTextColor(0xffffffff);
                          name.setTextSize(16f);
                          num.setTextColor(0xff7c5cbf);
                          // left border via padding
                          cv.setPadding(20,16,16,16);
                      } else {
                          cv.setBackgroundColor(0x00000000);
                          name.setTextColor(0xff7788aa);
                          name.setTextSize(14f);
                          num.setTextColor(0xff334060);
                          cv.setPadding(24,16,16,16);
                      }
                      return cv;
                  }
              }
          }
          EOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KhaloAhmed-APK
          path: app/build/outputs/apk/release/app-release*.apk
