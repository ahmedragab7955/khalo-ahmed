name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "2.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create Manifest and Resources
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>

              <!-- CRITICAL FIX: Required on Android 11+ to detect installed apps -->
              <queries>
                  <package android:name="com.epsxe.ePSXe"/>
                  <package android:name="org.ppsspp.ppsspp"/>
                  <package android:name="com.fastemulator.gbcfree"/>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:mimeType="*/*"/>
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name=".PlatformActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".GamesActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#08080f</color>
              <color name="bg_card">#0f0f23</color>
              <color name="bg_left">#0b0b1a</color>
              <color name="accent">#7c5cbf</color>
              <color name="accent2">#4477ff</color>
              <color name="gold">#f0c040</color>
              <color name="neon">#00cfff</color>
              <color name="text_white">#ffffff</color>
              <color name="text_dim">#445070</color>
              <color name="selected_bg">#16163a</color>
              <color name="divider">#0d0d20</color>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">@color/bg_dark</item>
                  <item name="android:windowAnimationStyle">@style/WindowAnim</item>
              </style>
              <style name="WindowAnim" parent="android:Animation.Activity">
                  <item name="android:activityOpenEnterAnimation">@anim/slide_in_right</item>
                  <item name="android:activityOpenExitAnimation">@anim/slide_out_left</item>
                  <item name="android:activityCloseEnterAnimation">@anim/slide_in_left</item>
                  <item name="android:activityCloseExitAnimation">@anim/slide_out_right</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Khalo Ahmed</string>
          </resources>
          EOF

          # Animations
          cat > app/src/main/res/anim/slide_in_right.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="100%" android:toXDelta="0%"
              android:duration="280" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/slide_out_left.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="0%" android:toXDelta="-100%"
              android:duration="280" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/slide_in_left.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="-100%" android:toXDelta="0%"
              android:duration="280" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/slide_out_right.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="0%" android:toXDelta="100%"
              android:duration="280" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/fade_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <alpha xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromAlpha="0.0" android:toAlpha="1.0"
              android:duration="220" android:interpolator="@android:anim/decelerate_interpolator"/>
          EOF

          cat > app/src/main/res/anim/pop_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:fromXScale="0.85" android:toXScale="1.0"
                  android:fromYScale="0.85" android:toYScale="1.0"
                  android:pivotX="50%" android:pivotY="50%"
                  android:duration="200" android:interpolator="@android:anim/overshoot_interpolator"/>
              <alpha android:fromAlpha="0.0" android:toAlpha="1.0"
                  android:duration="180"/>
          </set>
          EOF

          # Layouts
          cat > app/src/main/res/layout/activity_platform.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_dark">

              <LinearLayout
                  android:id="@+id/headerLayout"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_alignParentTop="true"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:paddingTop="30dp"
                  android:paddingBottom="16dp">

                  <TextView
                      android:id="@+id/title"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="KHALO AHMED"
                      android:textColor="@color/neon"
                      android:textSize="30sp"
                      android:textStyle="bold"
                      android:letterSpacing="0.25"
                      android:fontFamily="sans-serif-condensed"/>

                  <View
                      android:layout_width="120dp"
                      android:layout_height="2dp"
                      android:layout_marginTop="8dp"
                      android:background="@color/accent"/>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/platformRow"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_centerInParent="true"
                  android:orientation="horizontal"
                  android:gravity="center"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_alignParentBottom="true"
                  android:layout_centerHorizontal="true"
                  android:layout_marginBottom="16dp"
                  android:text="◀ ▶  تنقل      OK  دخول      START+SELECT  خروج"
                  android:textColor="@color/text_dim"
                  android:textSize="11sp"
                  android:fontFamily="sans-serif-light"/>
          </RelativeLayout>
          EOF

          cat > app/src/main/res/layout/activity_games.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_dark"
              android:orientation="horizontal">

              <!-- Left Panel: Game List -->
              <LinearLayout
                  android:layout_width="0dp"
                  android:layout_height="match_parent"
                  android:layout_weight="38"
                  android:background="@color/bg_left"
                  android:orientation="vertical">

                  <!-- Platform header -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:paddingStart="20dp"
