name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project skeleton
        run: |
          mkdir -p app/src/main/java/com/khaloahmed/launcher
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          cat > settings.gradle << 'GRADLE_EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "KhaloAhmed"
          include ':app'
          GRADLE_EOF

          cat > gradle.properties << 'GPROPS_EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          GPROPS_EOF

          cat > build.gradle << 'BGRD_EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          BGRD_EOF

          cat > app/build.gradle << 'APPGRD_EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khaloahmed.launcher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.khaloahmed.launcher"
                  minSdk 21
                  targetSdk 34
                  versionCode 3
                  versionName "3.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          APPGRD_EOF

      - name: Create Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.khaloahmed.launcher">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>

              <queries>
                  <package android:name="com.epsxe.ePSXe"/>
                  <package android:name="org.ppsspp.ppsspp"/>
                  <package android:name="com.fastemulator.gbcfree"/>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:mimeType="*/*"/>
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:label="Khalo Ahmed"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name=".PlatformActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".GamesActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:screenOrientation="landscape"/>
              </application>
          </manifest>
          MANIFEST_EOF

      - name: Create Resources
        run: |
          cat > app/src/main/res/values/colors.xml << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg">#0a0a18</color>
              <color name="bg_panel">#0d0d1e</color>
              <color name="bg_card">#111126</color>
              <color name="divider">#0f0f22</color>
              <color name="text_bright">#ffffff</color>
              <color name="text_mid">#8899bb</color>
              <color name="text_dim">#3a4060</color>
          </resources>
          COLORS_EOF

          cat > app/src/main/res/values/strings.xml << 'STR_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Khalo Ahmed</string>
          </resources>
          STR_EOF

          cat > app/src/main/res/values/styles.xml << 'STYLES_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">@color/bg</item>
                  <item name="android:windowAnimationStyle">@style/WinAnim</item>
              </style>
              <style name="WinAnim" parent="android:Animation.Activity">
                  <item name="android:activityOpenEnterAnimation">@anim/slide_in_right</item>
                  <item name="android:activityOpenExitAnimation">@anim/slide_out_left</item>
                  <item name="android:activityCloseEnterAnimation">@anim/slide_in_left</item>
                  <item name="android:activityCloseExitAnimation">@anim/slide_out_right</item>
              </style>
          </resources>
          STYLES_EOF

          cat > app/src/main/res/anim/slide_in_right.xml << 'A1_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="100%" android:toXDelta="0%"
              android:duration="260" android:interpolator="@android:anim/decelerate_interpolator"/>
          A1_EOF

          cat > app/src/main/res/anim/slide_out_left.xml << 'A2_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="0%" android:toXDelta="-100%"
              android:duration="260" android:interpolator="@android:anim/decelerate_interpolator"/>
          A2_EOF

          cat > app/src/main/res/anim/slide_in_left.xml << 'A3_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="-100%" android:toXDelta="0%"
              android:duration="260" android:interpolator="@android:anim/decelerate_interpolator"/>
          A3_EOF

          cat > app/src/main/res/anim/slide_out_right.xml << 'A4_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromXDelta="0%" android:toXDelta="100%"
              android:duration="260" android:interpolator="@android:anim/decelerate_interpolator"/>
          A4_EOF

          cat > app/src/main/res/anim/fade_in.xml << 'A5_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <alpha xmlns:android="http://schemas.android.com/apk/res/android"
              android:fromAlpha="0.0" android:toAlpha="1.0"
              android:duration="200"/>
          A5_EOF

          cat > app/src/main/res/anim/pop_in.xml << 'A6_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:fromXScale="0.82" android:toXScale="1.0"
                  android:fromYScale="0.82" android:toYScale="1.0"
                  android:pivotX="50%" android:pivotY="50%"
                  android:duration="220"
                  android:interpolator="@android:anim/overshoot_interpolator"/>
              <alpha android:fromAlpha="0.0" android:toAlpha="1.0" android:duration="160"/>
          </set>
          A6_EOF

      - name: Create Layouts
        run: |
          cat > app/src/main/res/layout/activity_platform.xml << 'L1_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg">

              <LinearLayout
                  android:id="@+id/header"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_alignParentTop="true"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:paddingTop="28dp"
                  android:paddingBottom="12dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="KHALO AHMED"
                      android:textColor="#ffffff"
                      android:textSize="28sp"
                      android:textStyle="bold"
                      android:letterSpacing="0.22"
                      android:fontFamily="sans-serif-condensed"/>

                  <View
                      android:layout_width="160dp"
                      android:layout_height="2dp"
                      android:layout_marginTop="8dp"
                      android:background="#ff6633"/>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/platformRow"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_centerInParent="true"
                  android:orientation="horizontal"
                  android:gravity="center"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_alignParentBottom="true"
                  android:layout_centerHorizontal="true"
                  android:layout_marginBottom="14dp"
                  android:text="  DPAD  تنقل        A  دخول        START+SELECT  خروج  "
                  android:textColor="#334060"
                  android:textSize="11sp"/>
          </RelativeLayout>
          L1_EOF

          cat > app/src/main/res/layout/activity_games.xml << 'L2_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg"
              android:orientation="horizontal">

              <LinearLayout
                  android:layout_width="0dp"
                  android:layout_height="match_parent"
                  android:layout_weight="38"
                  android:background="@color/bg_panel"
                  android:orientation="vertical">

                  <LinearLayout
                      android:id="@+id/platformBadge"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:paddingStart="18dp"
                      android:paddingEnd="18dp"
                      android:paddingTop="16dp"
                      android:paddingBottom="14dp">

                      <TextView
                          android:id="@+id/platformName"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:textSize="14sp"
                          android:textStyle="bold"
                          android:letterSpacing="0.2"
                          android:fontFamily="monospace"/>

                      <TextView
                          android:id="@+id/gameCount"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:textColor="#445570"
                          android:textSize="11sp"
                          android:fontFamily="monospace"
                          android:layout_marginTop="2dp"/>
                  </LinearLayout>

                  <View
                      android:id="@+id/separator"
                      android:layout_width="match_parent"
                      android:layout_height="2dp"/>

                  <ListView
                      android:id="@+id/gameList"
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:divider="@color/divider"
                      android:dividerHeight="1dp"
                      android:scrollbars="none"
                      android:focusable="false"
                      android:overScrollMode="never"/>
              </LinearLayout>

              <FrameLayout
                  android:layout_width="0dp"
                  android:layout_height="match_parent"
                  android:layout_weight="62"
                  android:background="#000000">

                  <ImageView
                      android:id="@+id/previewBg"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:scaleType="centerCrop"
                      android:alpha="0.15"/>

                  <ImageView
                      android:id="@+id/previewImg"
                      android:layout_width="wrap_content"
                      android:layout_height="match_parent"
                      android:layout_gravity="center"
                      android:scaleType="fitCenter"
                      android:adjustViewBounds="true"
                      android:padding="26dp"/>

                  <TextView
                      android:id="@+id/noArtIcon"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_gravity="center"
                      android:textSize="88sp"
                      android:visibility="gone"/>

                  <TextView
                      android:id="@+id/previewTitle"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_gravity="bottom"
                      android:paddingStart="22dp"
                      android:paddingEnd="22dp"
                      android:paddingTop="30dp"
                      android:paddingBottom="16dp"
                      android:textColor="#ffffffee"
                      android:textSize="17sp"
                      android:textStyle="bold"
                      android:gravity="center"
                      android:background="#cc000000"
                      android:fontFamily="sans-serif-condensed"
                      android:letterSpacing="0.04"/>
              </FrameLayout>
          </LinearLayout>
          L2_EOF

          cat > app/src/main/res/layout/item_game.xml << 'L3_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:paddingLeft="8dp"
              android:paddingRight="8dp"
              android:paddingTop="3dp"
              android:paddingBottom="3dp">

              <LinearLayout
                  android:id="@+id/cardBg"
                  android:layout_width="match_parent"
                  android:layout_height="52dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="6dp"
                  android:paddingEnd="10dp">

                  <View
                      android:id="@+id/accentBar"
                      android:layout_width="4dp"
                      android:layout_height="30dp"
                      android:layout_marginEnd="10dp"
                      android:visibility="invisible"/>

                  <TextView
                      android:id="@+id/gameNum"
                      android:layout_width="32dp"
                      android:layout_height="wrap_content"
                      android:textSize="10sp"
                      android:fontFamily="monospace"/>

                  <TextView
                      android:id="@+id/gameName"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:textSize="14sp"
                      android:ellipsize="end"
                      android:singleLine="true"/>
              </LinearLayout>
          </FrameLayout>
          L3_EOF

      - name: Create Java Files
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/Config.java << 'CF_EOF'
          package com.khaloahmed.launcher;
          import android.graphics.Color;
          public class Config {
              public static final String[][] PLATFORMS = {
                  {"PS1", "/storage/0CF6-106E/ps1", "com.epsxe.ePSXe",
                   ".bin,.iso,.img,.pbp,.cue", "\uD83C\uDFAE", "#FF3355"},
                  {"PSP", "/storage/0CF6-106E/psp", "org.ppsspp.ppsspp",
                   ".iso,.cso,.pbp", "\uD83D\uDD79", "#2299FF"},
                  {"GBC", "/storage/0CF6-106E/gbc", "com.fastemulator.gbcfree",
                   ".gbc,.gb,.zip", "\uD83D\uDC7E", "#44DD66"},
              };
              public static final String[] IMAGE_EXTS = {".png", ".jpg", ".jpeg", ".webp"};
              public static int accent(int idx) {
                  return Color.parseColor(PLATFORMS[idx][5]);
              }
              public static int accentA(int idx, int alpha) {
                  return (accent(idx) & 0x00ffffff) | (alpha << 24);
              }
          }
          CF_EOF

          cat > app/src/main/java/com/khaloahmed/launcher/GameItem.java << 'GI_EOF'
          package com.khaloahmed.launcher;
          public class GameItem {
              public final String name, file, artPath, platform;
              public GameItem(String name, String file, String artPath, String platform) {
                  this.name = name; this.file = file;
                  this.artPath = artPath; this.platform = platform;
              }
          }
          GI_EOF

          cat > app/src/main/java/com/khaloahmed/launcher/GameScanner.java << 'GS_EOF'
          package com.khaloahmed.launcher;
          import java.io.File;
          import java.util.*;
          public class GameScanner {
              public static List<GameItem> scan(String platformKey) {
                  List<GameItem> out = new ArrayList<>();
                  String[] cfg = find(platformKey);
                  if (cfg == null) return out;
                  File dir = new File(cfg[1]);
                  if (!dir.exists() || !dir.isDirectory()) return out;
                  File[] files = dir.listFiles();
                  if (files == null) return out;
                  Set<String> exts = new HashSet<>(Arrays.asList(cfg[3].split(",")));
                  Map<String, String> art = new HashMap<>();
                  for (File f : files) {
                      String n = f.getName().toLowerCase();
                      for (String ie : Config.IMAGE_EXTS) {
                          if (n.endsWith(ie)) art.put(n.substring(0, n.lastIndexOf('.')), f.getAbsolutePath());
                      }
                  }
                  for (File f : files) {
                      if (!f.isFile()) continue;
                      String nm = f.getName(), nl = nm.toLowerCase();
                      boolean rom = false;
                      for (String x : exts) if (nl.endsWith(x.trim())) { rom = true; break; }
                      if (!rom) continue;
                      String base = nm.contains(".") ? nm.substring(0, nm.lastIndexOf('.')) : nm;
                      String display = base.replaceAll("[_\\-]+", " ").trim();
                      String a = art.containsKey(base.toLowerCase()) ? art.get(base.toLowerCase()) : "";
                      out.add(new GameItem(display, nm, a, platformKey));
                  }
                  Collections.sort(out, (a, b) -> a.name.compareToIgnoreCase(b.name));
                  return out;
              }
              private static String[] find(String key) {
                  for (String[] p : Config.PLATFORMS) if (p[0].equals(key)) return p;
                  return null;
              }
          }
          GS_EOF

      - name: Create PlatformActivity
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/PlatformActivity.java << 'PA_EOF'
          package com.khaloahmed.launcher;
          import android.app.Activity;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.InputDevice;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.view.animation.AnimationUtils;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          public class PlatformActivity extends Activity {
              private int sel = 0;
              private boolean startHeld, selectHeld;
              private LinearLayout platformRow;
              private int[] counts;
              private long lastMove;
              private static final long MOVE_DELAY = 140;
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  fullscreen();
                  setContentView(R.layout.activity_platform);
                  platformRow = findViewById(R.id.platformRow);
                  counts = new int[Config.PLATFORMS.length];
                  for (int i = 0; i < Config.PLATFORMS.length; i++)
                      counts[i] = GameScanner.scan(Config.PLATFORMS[i][0]).size();
                  draw(true);
              }
              private void draw(boolean anim) {
                  platformRow.removeAllViews();
                  for (int i = 0; i < Config.PLATFORMS.length; i++) {
                      String[] p = Config.PLATFORMS[i];
                      boolean isSel = (i == sel);
                      int accent = Config.accent(i);
                      LinearLayout card = new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);
                      card.setGravity(Gravity.CENTER);
                      int size = isSel ? dp(248) : dp(198);
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(size, size);
                      lp.setMargins(dp(18), 0, dp(18), 0);
                      card.setLayoutParams(lp);
                      card.setPadding(dp(10), dp(10), dp(10), dp(10));
                      GradientDrawable bg = new GradientDrawable();
                      bg.setCornerRadius(dp(22));
                      if (isSel) {
                          bg.setColor(mixColor(accent, 0xff0a0a18, 0.20f));
                          bg.setStroke(dp(3), accent);
                          card.setElevation(dp(12));
                          card.setAlpha(1f);
                      } else {
                          bg.setColor(0xff111126);
                          bg.setStroke(dp(1), 0xff1a1a32);
                          card.setElevation(dp(2));
                          card.setAlpha(0.42f);
                      }
                      card.setBackground(bg);
                      TextView icon = new TextView(this);
                      icon.setText(p[4]);
                      icon.setTextSize(isSel ? 46 : 34);
                      icon.setGravity(Gravity.CENTER);
                      card.addView(icon);
                      TextView name = new TextView(this);
                      name.setText(p[0]);
                      name.setTextSize(isSel ? 15 : 11);
                      name.setTextColor(isSel ? accent : 0xff334060);
                      name.setGravity(Gravity.CENTER);
                      name.setTypeface(Typeface.MONOSPACE, Typeface.BOLD);
                      name.setLetterSpacing(0.2f);
                      name.setPadding(0, dp(5), 0, 0);
                      card.addView(name);
                      TextView cnt = new TextView(this);
                      cnt.setText(counts[i] + " GAMES");
                      cnt.setTextSize(9);
                      cnt.setTextColor(isSel ? Config.accentA(i, 170) : 0xff222240);
                      cnt.setGravity(Gravity.CENTER);
                      cnt.setTypeface(Typeface.MONOSPACE);
                      cnt.setPadding(0, dp(3), 0, 0);
                      card.addView(cnt);
                      final int idx = i;
                      card.setOnClickListener(v -> open(idx));
                      platformRow.addView(card);
                      if (isSel && anim) card.startAnimation(AnimationUtils.loadAnimation(this, R.anim.pop_in));
                  }
              }
              private void open(int idx) {
                  sel = idx;
                  Intent it = new Intent(this, GamesActivity.class);
                  it.putExtra("platformIdx", idx);
                  startActivity(it);
                  overridePendingTransition(R.anim.slide_in_right, R.anim.slide_out_left);
              }
              @Override public boolean onKeyDown(int kc, KeyEvent e) {
                  if (kc == KeyEvent.KEYCODE_BUTTON_START)  startHeld  = true;
                  if (kc == KeyEvent.KEYCODE_BUTTON_SELECT) selectHeld = true;
                  if (startHeld && selectHeld) { finish(); return true; }
                  switch (kc) {
                      case KeyEvent.KEYCODE_DPAD_LEFT:
                          if (sel > 0) { sel--; draw(true); } return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:
                          if (sel < Config.PLATFORMS.length-1) { sel++; draw(true); } return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          open(sel); return true;
                      case KeyEvent.KEYCODE_BACK:
                      case KeyEvent.KEYCODE_BUTTON_B:
                          finish(); return true;
                  }
                  return super.onKeyDown(kc, e);
              }
              @Override public boolean onKeyUp(int kc, KeyEvent e) {
                  if (kc == KeyEvent.KEYCODE_BUTTON_START)  startHeld  = false;
                  if (kc == KeyEvent.KEYCODE_BUTTON_SELECT) selectHeld = false;
                  return super.onKeyUp(kc, e);
              }
              @Override public boolean onGenericMotionEvent(MotionEvent ev) {
                  if ((ev.getSource() & InputDevice.SOURCE_JOYSTICK) != 0
                          && ev.getAction() == MotionEvent.ACTION_MOVE) {
                      long now = System.currentTimeMillis();
                      if (now - lastMove < MOVE_DELAY) return true;
                      float x = ev.getAxisValue(MotionEvent.AXIS_X);
                      float hx = ev.getAxisValue(MotionEvent.AXIS_HAT_X);
                      if ((x < -0.5f || hx < -0.5f) && sel > 0) { sel--; lastMove = now; draw(true); }
                      else if ((x > 0.5f || hx > 0.5f) && sel < Config.PLATFORMS.length-1) { sel++; lastMove = now; draw(true); }
                      return true;
                  }
                  return super.onGenericMotionEvent(ev);
              }
              private int mixColor(int a, int b, float f) {
                  int r = (int)(Color.red(a)*f   + Color.red(b)*(1-f));
                  int g = (int)(Color.green(a)*f + Color.green(b)*(1-f));
                  int bl= (int)(Color.blue(a)*f  + Color.blue(b)*(1-f));
                  return Color.rgb(r, g, bl);
              }
              private int dp(float d) { return (int)(d * getResources().getDisplayMetrics().density); }
              private void fullscreen() {
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
              }
          }
          PA_EOF

      - name: Create GamesActivity
        run: |
          cat > app/src/main/java/com/khaloahmed/launcher/GamesActivity.java << 'GA_EOF'
          package com.khaloahmed.launcher;
          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.graphics.drawable.GradientDrawable;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.StrictMode;
          import android.view.InputDevice;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.WindowManager;
          import android.view.animation.AnimationUtils;
          import android.widget.BaseAdapter;
          import android.widget.ImageView;
          import android.widget.ListView;
          import android.widget.TextView;
          import android.widget.Toast;
          import java.io.File;
          import java.util.List;
          public class GamesActivity extends Activity {
              private int platformIdx;
              private List<GameItem> games;
              private int sel = 0;
              private boolean startHeld, selectHeld;
              private ListView list;
              private ImageView previewImg, previewBg;
              private TextView noArtIcon, previewTitle, platformName, gameCount;
              private final Handler handler = new Handler();
              private Runnable previewRun;
              private Thread imgThread;
              private long lastInput;

              // Adaptive delay: faster as you hold longer
              private long delay(int repeat) {
                  if (repeat == 0)  return 150;
                  if (repeat < 5)   return 100;
                  if (repeat < 12)  return 52;
                  if (repeat < 22)  return 28;
                  return 16;
              }

              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  StrictMode.setVmPolicy(new StrictMode.VmPolicy.Builder().build());
                  fullscreen();
                  setContentView(R.layout.activity_games);
                  platformIdx  = getIntent().getIntExtra("platformIdx", 0);
                  games        = GameScanner.scan(Config.PLATFORMS[platformIdx][0]);
                  list         = findViewById(R.id.gameList);
                  previewImg   = findViewById(R.id.previewImg);
                  previewBg    = findViewById(R.id.previewBg);
                  noArtIcon    = findViewById(R.id.noArtIcon);
                  previewTitle = findViewById(R.id.previewTitle);
                  platformName = findViewById(R.id.platformName);
                  gameCount    = findViewById(R.id.gameCount);
                  int accent = Config.accent(platformIdx);
                  platformName.setText(Config.PLATFORMS[platformIdx][0]);
                  platformName.setTextColor(accent);
                  gameCount.setText(games.size() + " GAMES");
                  findViewById(R.id.separator).setBackgroundColor(accent);
                  GradientDrawable badgeBg = new GradientDrawable();
                  badgeBg.setColor(Config.accentA(platformIdx, 22));
                  findViewById(R.id.platformBadge).setBackground(badgeBg);
                  list.setAdapter(new GameAdapter());
                  list.setOnItemClickListener((p, v, pos, id) -> {
                      sel = pos; refresh(); schedulePreview();
                  });
                  updatePreview(false);
              }

              @Override protected void onResume() {
                  super.onResume();
                  fullscreen();
                  list.post(this::centerList);
              }

              @Override protected void onDestroy() {
                  super.onDestroy();
                  if (imgThread != null) imgThread.interrupt();
                  handler.removeCallbacksAndMessages(null);
              }

              private void refresh() {
                  ((GameAdapter) list.getAdapter()).notifyDataSetChanged();
                  list.post(this::centerList);
              }

              private void centerList() {
                  if (list.getHeight() == 0) return;
                  list.setSelectionFromTop(sel, list.getHeight() / 3);
              }

              private void schedulePreview() {
                  if (previewRun != null) handler.removeCallbacks(previewRun);
                  previewRun = () -> updatePreview(true);
                  handler.postDelayed(previewRun, 80);
              }

              private void updatePreview(boolean anim) {
                  if (games.isEmpty()) { showNoArt(); previewTitle.setText("لا توجد العاب"); return; }
                  GameItem g = games.get(sel);
                  previewTitle.setText(g.name);
                  if (g.artPath.isEmpty() || !new File(g.artPath).exists()) { showNoArt(); return; }
                  final String path = g.artPath;
                  if (imgThread != null && imgThread.isAlive()) imgThread.interrupt();
                  imgThread = new Thread(() -> {
                      BitmapFactory.Options opts = new BitmapFactory.Options();
                      opts.inPreferredConfig = Bitmap.Config.RGB_565;
                      Bitmap bmp = BitmapFactory.decodeFile(path, opts);
                      if (bmp == null || Thread.currentThread().isInterrupted()) return;
                      runOnUiThread(() -> {
                          previewImg.setImageBitmap(bmp);
                          previewBg.setImageBitmap(bmp);
                          previewImg.setVisibility(View.VISIBLE);
                          previewBg.setVisibility(View.VISIBLE);
                          noArtIcon.setVisibility(View.GONE);
                          if (anim) previewImg.startAnimation(AnimationUtils.loadAnimation(this, R.anim.fade_in));
                      });
                  });
                  imgThread.start();
              }

              private void showNoArt() {
                  previewImg.setVisibility(View.GONE);
                  previewBg.setVisibility(View.GONE);
                  noArtIcon.setVisibility(View.VISIBLE);
                  noArtIcon.setText(Config.PLATFORMS[platformIdx][4]);
              }

              private void launch() {
                  if (games.isEmpty()) return;
                  GameItem g = games.get(sel);
                  String[] cfg = Config.PLATFORMS[platformIdx];
                  String romPath = cfg[1] + "/" + g.file;
                  File rom = new File(romPath);
                  if (!rom.exists()) { toast("ملف اللعبة غير موجود"); return; }
                  String pkg = cfg[2];
                  if (!isInstalled(pkg)) { toast("المحاكي غير مثبت:\n" + pkg); return; }
                  switch (pkg) {
                      case "com.epsxe.ePSXe":  launchPS1(rom, romPath); break;
                      case "org.ppsspp.ppsspp": launchPSP(rom, romPath); break;
                      default: launchGeneric(pkg, rom); break;
                  }
              }

              private void launchPS1(File rom, String romPath) {
                  // Method A: direct activity + ROM extra (auto-loads ROM in ePSXe)
                  try {
                      Intent i = new Intent(Intent.ACTION_MAIN);
                      i.setComponent(new ComponentName("com.epsxe.ePSXe", "com.epsxe.ePSXe.ePSXe"));
                      i.putExtra("com.epsxe.ePSXe.ROM", romPath);
                      i.putExtra("ROM", romPath);
                      i.setData(Uri.fromFile(rom));
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_RESET_TASK_IF_NEEDED);
                      startActivity(i);
                      return;
                  } catch (Exception ignored) {}
                  // Method B: ACTION_VIEW with file URI
                  try {
                      Intent i = new Intent(Intent.ACTION_VIEW);
                      i.setData(Uri.parse("file://" + romPath));
                      i.setPackage("com.epsxe.ePSXe");
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(i);
                      return;
                  } catch (Exception ignored) {}
                  launchGeneric("com.epsxe.ePSXe", rom);
              }

              private void launchPSP(File rom, String romPath) {
                  try {
                      Intent i = new Intent(Intent.ACTION_MAIN);
                      i.setComponent(new ComponentName("org.ppsspp.ppsspp", "org.ppsspp.ppsspp.PpssppActivity"));
                      i.putExtra("org.ppsspp.ppsspp.Shortcuts", romPath);
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                      startActivity(i);
                  } catch (Exception e) { launchGeneric("org.ppsspp.ppsspp", rom); }
              }

              private void launchGeneric(String pkg, File rom) {
                  try {
                      Intent i = new Intent(Intent.ACTION_VIEW);
                      i.setData(Uri.fromFile(rom));
                      i.setPackage(pkg);
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(i);
                  } catch (Exception e) {
                      try {
                          Intent i = getPackageManager().getLaunchIntentForPackage(pkg);
                          if (i != null) startActivity(i);
                          else toast("تعذر فتح المحاكي");
                      } catch (Exception e2) { toast("خطأ في التشغيل"); }
                  }
              }

              private boolean isInstalled(String pkg) {
                  try { getPackageManager().getPackageInfo(pkg, 0); return true; }
                  catch (Exception e) { return false; }
              }

              private void toast(String m) { Toast.makeText(this, m, Toast.LENGTH_SHORT).show(); }

              @Override public boolean onKeyDown(int kc, KeyEvent e) {
                  if (kc == KeyEvent.KEYCODE_BUTTON_START)  startHeld  = true;
                  if (kc == KeyEvent.KEYCODE_BUTTON_SELECT) selectHeld = true;
                  if (startHeld && selectHeld) { finishAffinity(); return true; }
                  long now = System.currentTimeMillis();
                  int rep = e.getRepeatCount();
                  switch (kc) {
                      case KeyEvent.KEYCODE_DPAD_UP:
                          if (now - lastInput < delay(rep)) return true;
                          if (sel > 0) { lastInput = now; sel--; refresh(); schedulePreview(); }
                          return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:
                          if (now - lastInput < delay(rep)) return true;
                          if (sel < games.size()-1) { lastInput = now; sel++; refresh(); schedulePreview(); }
                          return true;
                      case KeyEvent.KEYCODE_BUTTON_A:
                      case KeyEvent.KEYCODE_ENTER:
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                          if (rep == 0) { lastInput = now; launch(); } return true;
                      case KeyEvent.KEYCODE_BUTTON_B:
                      case KeyEvent.KEYCODE_BACK:
                          finish();
                          overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
                          return true;
                  }
                  return super.onKeyDown(kc, e);
              }

              @Override public boolean onKeyUp(int kc, KeyEvent e) {
                  if (kc == KeyEvent.KEYCODE_BUTTON_START)  startHeld  = false;
                  if (kc == KeyEvent.KEYCODE_BUTTON_SELECT) selectHeld = false;
                  return super.onKeyUp(kc, e);
              }

              @Override public boolean onGenericMotionEvent(MotionEvent ev) {
                  if ((ev.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK
                          && ev.getAction() == MotionEvent.ACTION_MOVE) {
                      long now = System.currentTimeMillis();
                      float y  = ev.getAxisValue(MotionEvent.AXIS_Y);
                      float hy = ev.getAxisValue(MotionEvent.AXIS_HAT_Y);
                      long elapsed = now - lastInput;
                      long d = elapsed < 600 ? 110 : elapsed < 1400 ? 52 : 20;
                      if (y < -0.5f || hy < -0.5f) {
                          if (now - lastInput < d || sel <= 0) return true;
                          lastInput = now; sel--; refresh(); schedulePreview();
                      } else if (y > 0.5f || hy > 0.5f) {
                          if (now - lastInput < d || sel >= games.size()-1) return true;
                          lastInput = now; sel++; refresh(); schedulePreview();
                      }
                      return true;
                  }
                  return super.onGenericMotionEvent(ev);
              }

              @Override public void onBackPressed() {
                  finish();
                  overridePendingTransition(R.anim.slide_in_left, R.anim.slide_out_right);
              }

              private void fullscreen() {
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_FULLSCREEN|View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
              }

              private int dp(float d) { return (int)(d * getResources().getDisplayMetrics().density); }

              class GameAdapter extends BaseAdapter {
                  private final int accent   = Config.accent(platformIdx);
                  private final int accentBg = Config.accentA(platformIdx, 38);
                  private final int accentBd = Config.accentA(platformIdx, 140);

                  @Override public int getCount() { return games.size(); }
                  @Override public Object getItem(int p) { return games.get(p); }
                  @Override public long getItemId(int p) { return p; }

                  @Override public View getView(int pos, View cv, ViewGroup parent) {
                      VH vh;
                      if (cv == null) {
                          cv = getLayoutInflater().inflate(R.layout.item_game, parent, false);
                          vh = new VH();
                          vh.card = cv.findViewById(R.id.cardBg);
                          vh.bar  = cv.findViewById(R.id.accentBar);
                          vh.num  = cv.findViewById(R.id.gameNum);
                          vh.name = cv.findViewById(R.id.gameName);
                          cv.setTag(vh);
                      } else {
                          vh = (VH) cv.getTag();
                      }
                      GameItem g = games.get(pos);
                      boolean isSel = (pos == sel);
                      vh.num.setText(String.format("%02d", pos + 1));
                      vh.name.setText(g.name);
                      GradientDrawable bgd = new GradientDrawable();
                      bgd.setCornerRadius(dp(10));
                      if (isSel) {
                          bgd.setColor(accentBg);
                          bgd.setStroke(dp(1), accentBd);
                          vh.bar.setBackgroundColor(accent);
                          vh.bar.setVisibility(View.VISIBLE);
                          vh.num.setTextColor(accentBd);
                          vh.name.setTextColor(0xffffffff);
                          vh.name.setTextSize(15f);
                          vh.name.setTypeface(null, android.graphics.Typeface.BOLD);
                      } else {
                          bgd.setColor(0xff0e0e22);
                          bgd.setStroke(dp(1), 0xff17172c);
                          vh.bar.setVisibility(View.INVISIBLE);
                          vh.num.setTextColor(0xff2c3050);
                          vh.name.setTextColor(0xff5a6a88);
                          vh.name.setTextSize(13.5f);
                          vh.name.setTypeface(null, android.graphics.Typeface.NORMAL);
                      }
                      vh.card.setBackground(bgd);
                      return cv;
                  }
                  class VH { View card, bar; TextView num, name; }
              }
          }
          GA_EOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KhaloAhmed-APK
          path: app/build/outputs/apk/release/app-release*.apk
